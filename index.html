<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultwidgetversion='2' b:layoutsversion='3' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://google.com/2005/gml/b'>
<head>
<meta content='width=device-width, initial-scale=1' name='viewport'/>
<title>حكايتنا AI ⚡ المساعد الذكي</title>
<b:skin><![CDATA[
  :root {
    --primary: #00ff88;
    --secondary: #00d1ff;
    --bg: #080a0f;
    --card-bg: rgba(22, 27, 34, 0.8);
    --border: rgba(255, 255, 255, 0.1);
  }

  body {
    background: var(--bg);
    background-image: radial-gradient(circle at top right, rgba(0, 255, 136, 0.05), transparent),
                      radial-gradient(circle at bottom left, rgba(0, 209, 255, 0.05), transparent);
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    direction: rtl;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .ai-container {
    width: 92%;
    max-width: 500px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 35px;
    border: 1px solid var(--border);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
    position: relative;
    overflow: hidden;
  }

  /* خط مضيء في الأعلى */
  .ai-container::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
  }

  .header { text-align: center; margin-bottom: 25px; }
  .header h2 {
    font-size: 28px;
    font-weight: 900;
    margin: 0;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  .header p { color: #8b949e; font-size: 13px; margin-top: 8px; }

  .input-wrapper { position: relative; margin-bottom: 15px; }
  textarea {
    width: 100%;
    height: 120px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #fff;
    padding: 18px;
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
    resize: none;
    transition: 0.3s;
  }
  textarea:focus {
    border-color: var(--primary);
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
  }

  .btn-send {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: #050505;
    font-weight: 800;
    font-size: 17px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-send:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); }
  .btn-send:active { transform: translateY(0); opacity: 0.9; }

  #resBox {
    margin-top: 25px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 20px;
    padding: 20px;
    display: none;
    border-right: 4px solid var(--primary);
    line-height: 1.8;
    font-size: 15px;
    color: #e6edf3;
    animation: fadeIn 0.5s ease;
  }

  .loading {
    display: none;
    text-align: center;
    margin-top: 15px;
    color: var(--primary);
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
]]></b:skin>
</head>
<body>

<div class='ai-container'>
  <div class='header'>
    <h2>حكايتنا SONIC ⚡</h2>
    <p>المساعد الذكي لبحث المسلسلات والدردشة</p>
  </div>
  
  <div class='input-wrapper'>
    <textarea id='qIn' placeholder='اوصف مسلسل، ابحث عن مصارع، أو فقط قل مرحباً...'></textarea>
  </div>
  
  <button class='btn-send' id='btn' onclick='askAI()'>
    <span>إرسال صاعق</span>
    <span>🚀</span>
  </button>
  
  <div class='loading' id='wait'>⚡ جاري معالجة طلبك بذكاء...</div>
  <div id='resBox'></div>
</div>

<b:section id='main' showaddelement='false'/>

<script>
// <![CDATA[
const apiURL = "https://script.google.com/macros/s/AKfycby3Ibr8x4Z9Fj2YOaM0Xhtcc4ESY1Iiv4c0Omq63Hdsj1_q70k5v_Hly_UZORbibJcN/exec";

async function askAI() {
    const q = document.getElementById('qIn').value.trim();
    const box = document.getElementById('resBox');
    const wait = document.getElementById('wait');
    const btn = document.getElementById('btn');

    if(!q) return;

    box.style.display = "none";
    wait.style.display = "block";
    btn.disabled = true;

    try {
        const r = await fetch(apiURL + "?msg=" + encodeURIComponent(q));
        const t = await r.text();
        
        let finalMsg = t;
        
        // حل مشكلة الـ JSON: التحقق إذا كان الرد يحتوي على كود برمجي واستخراج النص منه
        try {
            const cleanData = JSON.parse(t);
            if(cleanData.response) {
                finalMsg = cleanData.response;
            }
        } catch(e) {
            // إذا لم يكن JSON، نستخدم النص كما هو
        }
        
        wait.style.display = "none";
        box.style.display = "block";
        box.innerHTML = "<b>حكايتنا AI:</b><br/>" + finalMsg;
        
    } catch(e) {
        wait.style.display = "none";
        box.style.display = "block";
        box.innerHTML = "⚠️ عذراً، حدث خطأ في الاتصال. حاول مرة أخرى.";
    } finally {
        btn.disabled = false;
    }
}
// ]]>
</script>

</body>
</html>
