    <style type='text/css'>
      /* أنماط CSS المتقدمة */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #fff;
      }
      
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      
      /* الهيدر */
      .header {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 30px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      
      .header h1 {
        font-size: 2.5em;
        margin-bottom: 20px;
        text-align: center;
        background: linear-gradient(45deg, #fff, #f0f0f0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      /* شريط البحث */
      .search-box {
        display: flex;
        gap: 10px;
        max-width: 600px;
        margin: 0 auto;
      }
      
      .search-box input {
        flex: 1;
        padding: 15px 20px;
        border: none;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      
      .search-box input::placeholder {
        color: rgba(255, 255, 255, 0.7);
      }
      
      .search-box input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.3);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }
      
      .search-box button {
        padding: 15px 30px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #ff6b6b, #ff4757);
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      
      .search-box button:hover {
        transform: scale(1.05);
      }
      
      /* شبكة المسلسلات */
      .series-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 25px;
        padding: 20px 0;
      }
      
      .series-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      
      .series-card:hover {
        transform: translateY(-15px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      
      .series-image {
        width: 100%;
        height: 350px;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      
      .series-card:hover .series-image {
        transform: scale(1.1);
      }
      
      .series-info {
        padding: 20px;
        position: relative;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      }
      
      .series-title {
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 10px;
        color: #fff;
      }
      
      .series-meta {
        display: flex;
        justify-content: space-between;
        color: #ffd700;
        font-size: 0.9em;
      }
      
      /* نافذة المشاهدة */
      .video-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      
      .video-modal.active {
        display: flex;
      }
      
      .video-container {
        width: 90%;
        max-width: 1000px;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
      }
      
      .video-player {
        width: 100%;
        aspect-ratio: 16/9;
      }
      
      .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #ff4757;
        color: #fff;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 20px;
        cursor: pointer;
        z-index: 1001;
      }
      
      /* قائمة الحلقات */
      .episodes-list {
        background: #1a1a1a;
        padding: 20px;
        border-radius: 15px;
        margin-top: 20px;
      }
      
      .episode-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #333;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      
      .episode-item:hover {
        background: #333;
      }
      
      /* تحميل */
      .loading {
        text-align: center;
        padding: 50px;
        font-size: 1.5em;
        color: #fff;
      }
      
      .loading i {
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

      // مفتاح فك التشفير (يجب استخراجه من التطبيق الأصلي)
      const DECRYPTION_KEY = 'your-actual-key-here';
      
      // دالة فك التشفير
      function decryptData(encryptedData, key) {
        try {
          // TODO: تحديد خوارزمية فك التشفير الصحيحة
          // هذا مثال باستخدام AES
          const bytes = CryptoJS.AES.decrypt(encryptedData, key);
          return bytes.toString(CryptoJS.enc.Utf8);
        } catch(e) {
          console.error('خطأ في فك التشفير:', e);
          return null;
        }
      }
      
      // جلب المسلسلات
      async function fetchSeries() {
        try {
          const response = await $.ajax({
            url: API_CONFIG.url,
            method: 'POST',
            headers: API_CONFIG.headers,
            data: API_CONFIG.payload,
            contentType: 'application/x-www-form-urlencoded'
          });
          
          // فك تشفير الرد
          const decrypted = decryptData(response, DECRYPTION_KEY);
          if(decrypted) {
            const data = JSON.parse(decrypted);
            displaySeries(data.series || data);
          }
        } catch(error) {
          console.error('خطأ في جلب البيانات:', error);
          // بيانات تجريبية في حالة فشل الاتصال
          const mockData = [
            {
              id: 1,
              title: 'مسلسل تجريبي 1',
              image: 'https://via.placeholder.com/300x400',
              rating: 8.5,
              episodes: 30
            },
            {
              id: 2,
              title: 'مسلسل تجريبي 2',
              image: 'https://via.placeholder.com/300x400',
              rating: 9.0,
              episodes: 24
            }
          ];
          displaySeries(mockData);
        }
      }
      
      // عرض المسلسلات
      function displaySeries(series) {
        const grid = document.getElementById('seriesGrid');
        grid.innerHTML = '';
        
        series.forEach(item => {
          const card = document.createElement('div');
          card.className = 'series-card';
          card.onclick = () => openSeries(item);
          
          card.innerHTML = `
            <img src='${item.image || 'https://via.placeholder.com/300x400'}' alt='${item.title}' class='series-image'/>
            <div class='series-info'>
              <h3 class='series-title'>${item.title}</h3>
              <div class='series-meta'>
                <span><i class='fas fa-star'></i> ${item.rating || 'N/A'}</span>
                <span><i class='fas fa-film'></i> ${item.episodes || 0} حلقة</span>
              </div>
            </div>
          `;
          
          grid.appendChild(card);
        });
      }
      
      // فتح مسلسل
      function openSeries(series) {
        // جلب حلقات المسلسل
        fetchEpisodes(series.id).then(episodes => {
          const modal = document.getElementById('videoModal');
          const episodesContainer = document.getElementById('episodesContainer');
          const videoPlayer = document.getElementById('videoPlayer');
          
          // عرض قائمة الحلقات
          episodesContainer.innerHTML = '<h3>الحلقات</h3>';
          episodes.forEach((ep, index) => {
            const epDiv = document.createElement('div');
            epDiv.className = 'episode-item';
            epDiv.innerHTML = `
              <span>الحلقة ${index + 1}: ${ep.title || 'بدون عنوان'}</span>
              <i class='fas fa-play'></i>
            `;
            epDiv.onclick = (e) => {
              e.stopPropagation();
              videoPlayer.src = ep.videoUrl;
              videoPlayer.play();
            };
            episodesContainer.appendChild(epDiv);
          });
          
          modal.classList.add('active');
        });
      }
      
      // جلب الحلقات (محاكاة)
      async function fetchEpisodes(seriesId) {
        // هنا يتم جلب الحلقات من API المسروق
        return [
          { title: 'الحلقة الأولى', videoUrl: 'https://example.com/video1.mp4' },
          { title: 'الحلقة الثانية', videoUrl: 'https://example.com/video2.mp4' }
        ];
      }
      
      // إغلاق النافذة
      function closeModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('active');
        video.pause();
        video.src = '';
      }
      
      // البحث

        const query = document.getElementById('searchInput').value;
        if(query.trim()) {

        }
