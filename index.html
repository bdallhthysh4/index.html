<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebSocket Stream</title>
</head>

<body style="background:black;color:white;text-align:center">

<h2>محاولة الاتصال بالبث</h2>

<button onclick="connect()">تشغيل</button>

<pre id="log"></pre>

<script>

function connect(){

let ws = new WebSocket("ws://117.55.202.104:60000/live?oid=0200bf7cb0lsfez69dd80tgrjty8nwd6");

ws.onopen = function(){
document.getElementById("log").innerHTML += "تم الاتصال بالسيرفر\n";
};

ws.onmessage = function(event){
document.getElementById("log").innerHTML += "استلام بيانات\n";
};

ws.onerror = function(){
document.getElementById("log").innerHTML += "خطأ بالاتصال\n";
};

}

</script>

</body>
</html>
