<!DOCTYPE html>
<html dir='rtl' lang='ar'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>حكايتنا+ | منصة البث الذكية</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
    }
    
    body {
      background: #141414;
      min-height: 100vh;
      color: #fff;
    }
    
    /* شاشة الدخول - ستايل نتفلكس */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.9) 100%), url('https://assets.nflxext.com/ffe/siteui/vlv3/154a9550-ce07-4e28-817c-73c9b8a7c1c3.jpg');
      background-size: cover;
      padding: 20px;
    }
    
    .login-card {
      background: rgba(0, 0, 0, 0.85);
      width: 100%;
      max-width: 450px;
      border-radius: 8px;
      padding: 60px 68px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      animation: slideUp 0.6s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .login-header .logo {
      margin-bottom: 30px;
    }
    
    .login-header .logo i {
      font-size: 60px;
      color: #e50914;
      filter: drop-shadow(0 0 10px rgba(229, 9, 20, 0.5));
    }
    
    .login-header h2 {
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .login-header p {
      color: #8c8c8c;
      font-size: 16px;
    }
    
    .login-input {
      width: 100%;
      padding: 16px 20px;
      margin-bottom: 25px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      background: #333;
      color: #fff;
      transition: all 0.3s;
    }
    
    .login-input:focus {
      background: #454545;
      outline: none;
    }
    
    .login-input::placeholder {
      color: #8c8c8c;
    }
    
    .login-btn {
      width: 100%;
      padding: 16px;
      background: #e50914;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .login-btn:hover {
      background: #f40612;
    }
    
    .error-message {
      color: #e50914;
      text-align: center;
      margin-top: 15px;
      display: none;
      font-weight: 500;
    }
    
    /* لوحة التحكم - ستايل نتفلكس */
    .dashboard {
      display: none;
      background: #141414;
      min-height: 100vh;
    }
    
    .dashboard.show {
      display: block;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* الشريط العلوي - ستايل نتفلكس */
    .top-bar {
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .brand-icon i {
      color: #e50914;
      font-size: 40px;
    }
    
    .brand h1 {
      font-size: 24px;
      color: #fff;
      font-weight: 700;
    }
    
    .brand span {
      color: #e50914;
    }
    
    .user-menu {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .logout-btn {
      background: rgba(229, 9, 20, 0.9);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }
    
    .logout-btn:hover {
      background: #e50914;
    }
    
    /* المحتوى الرئيسي */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 50px;
    }
    
    /* بطاقات الإحصائيات */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.8) 100%);
      border-radius: 8px;
      padding: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    
    .stat-card:hover {
      transform: scale(1.02);
      border-color: #e50914;
    }
    
    .stat-icon {
      width: 70px;
      height: 70px;
      background: rgba(229, 9, 20, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .stat-icon i {
      color: #e50914;
      font-size: 35px;
    }
    
    .stat-info h3 {
      color: #8c8c8c;
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    
    .stat-number {
      font-size: 42px;
      font-weight: 700;
      color: #fff;
    }
    
    /* قسم الذكاء الاصطناعي */
    .ai-section {
      background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,20,20,0.95) 100%);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
      border: 2px solid #e50914;
      box-shadow: 0 0 30px rgba(229, 9, 20, 0.3);
    }
    
    .ai-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .ai-header i {
      font-size: 30px;
      color: #e50914;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    
    .ai-header h3 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #e50914);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .ai-input-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .ai-input {
      flex: 1;
      padding: 18px 20px;
      background: #000;
      border: 2px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      transition: 0.3s;
    }
    
    .ai-input:focus {
      border-color: #e50914;
      outline: none;
    }
    
    .ai-btn {
      background: #e50914;
      color: white;
      border: none;
      padding: 0 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }
    
    .ai-btn:hover {
      background: #f40612;
      transform: translateY(-2px);
    }
    
    .ai-response {
      background: #000;
      border-radius: 8px;
      padding: 20px;
      border-left: 4px solid #e50914;
      display: none;
    }
    
    .ai-response.show {
      display: block;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .ai-response-content {
      color: #fff;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    
    /* تبويبات التصفح */
    .nav-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
    }
    
    .nav-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: #8c8c8c;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      transition: 0.3s;
    }
    
    .nav-btn:hover {
      color: #fff;
    }
    
    .nav-btn.active {
      color: #fff;
    }
    
    .nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0;
      right: 0;
      height: 3px;
      background: #e50914;
      border-radius: 3px 3px 0 0;
    }
    
    /* بطاقة المحتوى */
    .content-card {
      background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.8) 100%);
      border-radius: 12px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .content-header h2 {
      color: #fff;
      font-size: 26px;
      font-weight: 700;
    }
    
    .content-header h2 i {
      color: #e50914;
      margin-left: 10px;
    }
    
    /* النماذج */
    .form-row {
      margin-bottom: 25px;
    }
    
    .form-label {
      display: block;
      margin-bottom: 10px;
      color: #fff;
      font-weight: 600;
      font-size: 15px;
    }
    
    .form-input {
      width: 100%;
      padding: 15px 18px;
      background: #333;
      border: 2px solid #404040;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      transition: 0.3s;
    }
    
    .form-input:focus {
      border-color: #e50914;
      outline: none;
      background: #3a3a3a;
    }
    
    textarea.form-input {
      min-height: 100px;
      resize: vertical;
    }
    
    /* الحلقات */
    .episodes-section {
      background: #000;
      border-radius: 8px;
      padding: 25px;
      margin: 30px 0;
    }
    
    .episodes-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .episodes-title h3 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }
    
    .add-episode-btn {
      background: rgba(229, 9, 20, 0.8);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }
    
    .add-episode-btn:hover {
      background: #e50914;
    }
    
    .episode-item {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      gap: 20px;
      border: 1px solid #333;
    }
    
    .episode-inputs {
      flex: 1;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 10px;
    }
    
    .episode-inputs input {
      padding: 12px;
      background: #2a2a2a;
      border: 2px solid #404040;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
    }
    
    .delete-episode {
      background: #e50914;
      color: white;
      border: none;
      width: 45px;
      height: 45px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    
    .delete-episode:hover {
      background: #f40612;
    }
    
    /* أزرار الإجراءات */
    .action-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }
    
    .primary-btn {
      background: #e50914;
      color: white;
      border: none;
      padding: 14px 35px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }
    
    .primary-btn:hover {
      background: #f40612;
      transform: translateY(-2px);
    }
    
    .secondary-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 14px 35px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.3s;
    }
    
    .secondary-btn:hover {
      background: #3a3a3a;
    }
    
    /* الجدول */
    .table-wrapper {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #333;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background: #1a1a1a;
      padding: 18px;
      text-align: right;
      font-weight: 600;
      color: #fff;
      font-size: 14px;
      border-bottom: 2px solid #333;
    }
    
    td {
      padding: 18px;
      border-bottom: 1px solid #333;
      color: #fff;
    }
    
    tr:hover td {
      background: #1a1a1a;
    }
    
    .table-img {
      width: 50px;
      height: 70px;
      object-fit: cover;
      border-radius: 4px;
    }
    
    .table-actions {
      display: flex;
      gap: 8px;
    }
    
    .edit-btn {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #404040;
      width: 35px;
      height: 35px;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .edit-btn:hover {
      background: #3a3a3a;
      border-color: #e50914;
    }
    
    .delete-btn {
      background: #e50914;
      color: white;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .delete-btn:hover {
      background: #f40612;
    }
    
    /* التبويبات */
    .tab-panel {
      display: none;
    }
    
    .tab-panel.active {
      display: block;
    }
    
    /* التنبيهات */
    .alert {
      padding: 15px 20px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .alert.show {
      display: block;
    }
    
    .alert-success {
      background: #00a86b;
      color: #fff;
    }
    
    .alert-error {
      background: #e50914;
      color: #fff;
    }
    
    /* تصغير الشاشة */
    @media (max-width: 768px) {
      .top-bar { padding: 20px; }
      .main-content { padding: 20px; }
      .episode-inputs { grid-template-columns: 1fr; }
      .nav-tabs { flex-direction: column; }
      .login-card { padding: 40px 20px; }
      .ai-input-group { flex-direction: column; }
      .ai-btn { padding: 15px; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- شاشة الدخول -->
<div class='login-container' id='loginScreen'>
  <div class='login-card'>
    <div class='login-header'>
      <div class='logo'>
        <i class='fab fa-netflix'></i>
      </div>
      <h2>حكايتنا+</h2>
      <p>لوحة تحكم المدير</p>
    </div>
    
    <input type='password' class='login-input' id='adminPassword' placeholder='كلمة المرور'>
    <button class='login-btn' onclick='checkAdminLogin()'>
      <i class='fas fa-sign-in-alt'></i>
      تسجيل الدخول
    </button>
    
    <div class='error-message' id='loginError'>
      <i class='fas fa-exclamation-circle'></i>
      كلمة المرور غير صحيحة
    </div>
  </div>
</div>

<!-- لوحة التحكم -->
<div class='dashboard' id='adminPanel'>
  <!-- الشريط العلوي -->
  <div class='top-bar'>
    <div class='brand'>
      <div class='brand-icon'>
        <i class='fab fa-netflix'></i>
      </div>
      <h1>حكايتنا<span>+</span></h1>
    </div>
    
    <div class='user-menu'>
      <button class='logout-btn' onclick='logoutAdmin()'>
        <i class='fas fa-sign-out-alt'></i>
        تسجيل الخروج
      </button>
    </div>
  </div>
  
  <!-- المحتوى الرئيسي -->
  <div class='main-content'>
    <!-- الإحصائيات -->
    <div class='stats-grid'>
      <div class='stat-card'>
        <div class='stat-icon'>
          <i class='fas fa-tv'></i>
        </div>
        <div class='stat-info'>
          <h3>إجمالي المسلسلات</h3>
          <div class='stat-number' id='totalSeries'>0</div>
        </div>
      </div>
      
      <div class='stat-card'>
        <div class='stat-icon'>
          <i class='fas fa-film'></i>
        </div>
        <div class='stat-info'>
          <h3>إجمالي الحلقات</h3>
          <div class='stat-number' id='totalEpisodes'>0</div>
        </div>
      </div>
    </div>
    
    <!-- قسم الذكاء الاصطناعي الجديد -->
    <div class='ai-section'>
      <div class='ai-header'>
        <i class='fas fa-robot'></i>
        <h3>الذكاء الاصطناعي - إضافة حلقات ذكية</h3>
      </div>
      
      <div class='ai-input-group'>
        <input type='text' class='ai-input' id='aiSeriesSearch' placeholder='ابحث عن مسلسل...'>
        <textarea class='ai-input' id='aiEpisodesData' placeholder='أدخل الحلقات (كل حلقة في سطر جديد بالصيغة: عنوان الحلقة | رابط السيرفر1 | رابط السيرفر2 | رابط السيرفر3)' rows='4'></textarea>
        <button class='ai-btn' onclick='addEpisodesWithAI()'>
          <i class='fas fa-magic'></i>
          إضافة دفعة واحدة
        </button>
      </div>
      
      <div class='ai-response' id='aiResponse'>
        <div class='ai-response-content' id='aiResponseContent'></div>
      </div>
    </div>
    
    <!-- تبويبات التصفح -->
    <div class='nav-tabs'>
      <button class='nav-btn active' onclick='switchPanel("add", this)'>
        <i class='fas fa-plus-circle'></i>
        إضافة مسلسل
      </button>
      <button class='nav-btn' onclick='switchPanel("list", this)'>
        <i class='fas fa-list'></i>
        قائمة المسلسلات
      </button>
    </div>
    
    <!-- لوحة الإضافة -->
    <div class='tab-panel active' id='addPanel'>
      <div class='content-card'>
        <div class='content-header'>
          <h2><i class='fas fa-plus-circle'></i> إضافة مسلسل جديد</h2>
        </div>
        
        <div class='alert alert-success' id='successAlert'>تم الحفظ بنجاح</div>
        <div class='alert alert-error' id='errorAlert'>حدث خطأ</div>
        
        <div class='form-row'>
          <label class='form-label'>اسم المسلسل</label>
          <input type='text' class='form-input' id='seriesTitle' placeholder='مثال: المؤسس عثمان'>
        </div>
        
        <div class='form-row'>
          <label class='form-label'>رابط الصورة</label>
          <input type='url' class='form-input' id='seriesImage' placeholder='https://example.com/image.jpg'>
        </div>
        
        <div class='form-row'>
          <label class='form-label'>التصنيف</label>
          <input type='text' class='form-input' id='seriesCategory' placeholder='تركي, عربي, أكشن, دراما'>
        </div>
        
        <div class='form-row'>
          <label class='form-label'>الوصف</label>
          <textarea class='form-input' id='seriesDescription' placeholder='وصف مختصر للمسلسل...'></textarea>
        </div>
        
        <div class='form-row'>
          <label class='form-label'>التقييم (0 - 5)</label>
          <input type='number' class='form-input' id='seriesRating' min='0' max='5' step='0.1' value='0'>
        </div>
        
        <!-- الحلقات -->
        <div class='episodes-section'>
          <div class='episodes-title'>
            <h3><i class='fas fa-list'></i> قائمة الحلقات</h3>
            <button class='add-episode-btn' onclick='addNewEpisode()'>
              <i class='fas fa-plus'></i>
              إضافة حلقة
            </button>
          </div>
          
          <div id='episodesContainer'></div>
        </div>
        
        <!-- أزرار الإجراءات -->
        <div class='action-buttons'>
          <button class='primary-btn' onclick='saveSeries()'>
            <i class='fas fa-save'></i>
            حفظ المسلسل
          </button>
          <button class='secondary-btn' onclick='resetForm()'>
            <i class='fas fa-redo'></i>
            تفريغ الحقول
          </button>
        </div>
      </div>
    </div>
    
    <!-- لوحة القائمة -->
    <div class='tab-panel' id='listPanel'>
      <div class='content-card'>
        <div class='content-header'>
          <h2><i class='fas fa-list'></i> جميع المسلسلات</h2>
        </div>
        
        <div class='table-wrapper'>
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>اسم المسلسل</th>
                <th>التصنيف</th>
                <th>عدد الحلقات</th>
                <th>التقييم</th>
                <th>التحكم</th>
              </tr>
            </thead>
            <tbody id='seriesTable'></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'></script>

<script>
// إعدادات Firebase
firebase.initializeApp({
  apiKey: "AIzaSyCEaxXR5eqzg0e5JvjWAFjZ5ZeMraMYREn",
  authDomain: "mo-play-b0cb7.firebaseapp.com",
  databaseURL: "https://mo-play-b0cb7-default-rtdb.firebaseio.com",
  projectId: "mo-play-b0cb7",
  storageBucket: "mo-play-b0cb7.firebasestorage.app",
  appId: "1:575424024738:web:0b1736c0c2e496adf607fb"
});

const db = firebase.database();
let seriesData = [];
let editMode = false;
let editId = null;

// التحقق من كلمة المرور
function checkAdminLogin() {
  const password = document.getElementById('adminPassword').value;
  if (password === 'fugrUEV*3KsW9XS') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').classList.add('show');
    loadSeries();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

// تسجيل الخروج
function logoutAdmin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').classList.remove('show');
  document.getElementById('adminPassword').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// تبديل اللوحات
function switchPanel(panel, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  
  btn.classList.add('active');
  
  if (panel === 'add') {
    document.getElementById('addPanel').classList.add('active');
  } else {
    document.getElementById('listPanel').classList.add('active');
    displaySeriesList();
  }
}

// إضافة حقل حلقة جديد
function addNewEpisode() {
  const container = document.getElementById('episodesContainer');
  const episodeDiv = document.createElement('div');
  episodeDiv.className = 'episode-item';
  
  episodeDiv.innerHTML = `
    <div class="episode-inputs">
      <input type="text" placeholder="عنوان الحلقة">
      <input type="url" placeholder="رابط السيرفر 1">
      <input type="url" placeholder="رابط السيرفر 2">
      <input type="url" placeholder="رابط السيرفر 3">
    </div>
    <button class="delete-episode" onclick="this.parentElement.remove()">
      <i class="fas fa-trash"></i>
    </button>
  `;
  
  container.appendChild(episodeDiv);
}

// وظيفة الذكاء الاصطناعي لإضافة حلقات دفعة واحدة
function addEpisodesWithAI() {
  const searchQuery = document.getElementById('aiSeriesSearch').value.trim();
  const episodesText = document.getElementById('aiEpisodesData').value.trim();
  
  if (!searchQuery || !episodesText) {
    showAIResponse('الرجاء إدخال اسم المسلسل وبيانات الحلقات');
    return;
  }
  
  // البحث عن المسلسل
  const series = seriesData.find(s => 
    s.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
    searchQuery.toLowerCase().includes(s.title.toLowerCase())
  );
  
  if (!series) {
    showAIResponse('لم يتم العثور على مسلسل بهذا الاسم. تأكد من الاسم أو أضف المسلسل أولاً.');
    return;
  }
  
  // تحليل الحلقات
  const lines = episodesText.split('\n');
  const newEpisodes = [];
  
  lines.forEach(line => {
    const parts = line.split('|').map(p => p.trim());
    if (parts.length >= 2 && parts[0]) {
      newEpisodes.push({
        title: parts[0],
        link1: parts[1] || '',
        link2: parts[2] || '',
        link3: parts[3] || ''
      });
    }
  });
  
  if (newEpisodes.length === 0) {
    showAIResponse('لم يتم العثور على حلقات صالحة. تأكد من الصيغة: عنوان | رابط1 | رابط2 | رابط3');
    return;
  }
  
  // دمج الحلقات الجديدة مع القديمة
  const updatedEpisodes = [...(series.episodes || []), ...newEpisodes];
  
  // تحديث في Firebase
  db.ref('series/' + series.id).update({ episodes: updatedEpisodes })
    .then(() => {
      showAIResponse(`✅ تم إضافة ${newEpisodes.length} حلقة بنجاح إلى "${series.title}"`);
      document.getElementById('aiEpisodesData').value = '';
      loadSeries(); // إعادة تحميل البيانات
    })
    .catch(error => {
      showAIResponse('❌ خطأ: ' + error.message);
    });
}

// عرض رد الذكاء الاصطناعي
function showAIResponse(message) {
  const aiResponse = document.getElementById('aiResponse');
  const content = document.getElementById('aiResponseContent');
  
  content.textContent = message;
  aiResponse.classList.add('show');
  
  // إخفاء بعد 5 ثواني
  setTimeout(() => {
    aiResponse.classList.remove('show');
  }, 5000);
}

// حفظ المسلسل
function saveSeries() {
  const title = document.getElementById('seriesTitle').value.trim();
  const image = document.getElementById('seriesImage').value.trim();
  const category = document.getElementById('seriesCategory').value.trim();
  const description = document.getElementById('seriesDescription').value.trim();
  const rating = parseFloat(document.getElementById('seriesRating').value) || 0;
  
  if (!title || !image) {
    showAlert('error', 'الرجاء إدخال اسم المسلسل والصورة');
    return;
  }
  
  // جمع بيانات الحلقات
  const episodes = [];
  document.querySelectorAll('.episode-item').forEach(item => {
    const inputs = item.querySelectorAll('input');
    if (inputs.length >= 2 && inputs[0].value && inputs[1].value) {
      episodes.push({
        title: inputs[0].value,
        link1: inputs[1].value,
        link2: inputs[2]?.value || '',
        link3: inputs[3]?.value || ''
      });
    }
  });
  
  const seriesObject = {
    title: title,
    image: image,
    category: category || 'غير مصنف',
    description: description || '',
    rating: rating,
    ratingCount: 0,
    views: 0,
    episodes: episodes
  };
  
  if (editMode && editId) {
    db.ref('series/' + editId).update(seriesObject)
      .then(() => {
        showAlert('success', 'تم تحديث المسلسل بنجاح');
        resetForm();
        loadSeries();
        editMode = false;
        editId = null;
      })
      .catch(error => showAlert('error', error.message));
  } else {
    db.ref('series').push(seriesObject)
      .then(() => {
        showAlert('success', 'تم إضافة المسلسل بنجاح');
        resetForm();
        loadSeries();
      })
      .catch(error => showAlert('error', error.message));
  }
}

// عرض التنبيهات
function showAlert(type, message) {
  const alertBox = document.getElementById(type === 'success' ? 'successAlert' : 'errorAlert');
  alertBox.textContent = message;
  alertBox.classList.add('show');
  setTimeout(() => alertBox.classList.remove('show'), 3000);
}

// تصفير النموذج
function resetForm() {
  document.getElementById('seriesTitle').value = '';
  document.getElementById('seriesImage').value = '';
  document.getElementById('seriesCategory').value = '';
  document.getElementById('seriesDescription').value = '';
  document.getElementById('seriesRating').value = '0';
  document.getElementById('episodesContainer').innerHTML = '';
  addNewEpisode();
  editMode = false;
  editId = null;
}

// تحميل المسلسلات
function loadSeries() {
  db.ref('series').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      seriesData = Object.keys(data).map(key => ({
        id: key,
        ...data[key]
      }));
      
      // تحديث الإحصائيات
      document.getElementById('totalSeries').textContent = seriesData.length;
      
      let totalEpisodes = 0;
      seriesData.forEach(s => {
        totalEpisodes += (s.episodes ? s.episodes.length : 0);
      });
      document.getElementById('totalEpisodes').textContent = totalEpisodes;
      
      displaySeriesList();
    }
  });
}

// عرض قائمة المسلسلات
function displaySeriesList() {
  const tbody = document.getElementById('seriesTable');
  tbody.innerHTML = '';
  
  seriesData.forEach(series => {
    const row = document.createElement('tr');
    const episodeCount = series.episodes ? series.episodes.length : 0;
    
    row.innerHTML = `
      <td>
        <img src="${series.image}" class="table-img" onerror="this.src='https://via.placeholder.com/50x70/e50914/ffffff?text=No'">
      </td>
      <td>${series.title}</td>
      <td>${series.category || 'غير مصنف'}</td>
      <td>${episodeCount} حلقة</td>
      <td>★ ${series.rating || 0}</td>
      <td>
        <div class="table-actions">
          <button class="edit-btn" onclick="editSeries('${series.id}')">
            <i class="fas fa-edit"></i>
          </button>
          <button class="delete-btn" onclick="deleteSeries('${series.id}')">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </td>
    `;
    tbody.appendChild(row);
  });
}

// تعديل مسلسل
function editSeries(id) {
  const series = seriesData.find(s => s.id === id);
  if (!series) return;
  
  editMode = true;
  editId = id;
  
  document.getElementById('seriesTitle').value = series.title || '';
  document.getElementById('seriesImage').value = series.image || '';
  document.getElementById('seriesCategory').value = series.category || '';
  document.getElementById('seriesDescription').value = series.description || '';
  document.getElementById('seriesRating').value = series.rating || 0;
  
  const container = document.getElementById('episodesContainer');
  container.innerHTML = '';
  
  if (series.episodes && series.episodes.length > 0) {
    series.episodes.forEach(ep => {
      const episodeDiv = document.createElement('div');
      episodeDiv.className = 'episode-item';
      
      episodeDiv.innerHTML = `
        <div class="episode-inputs">
          <input type="text" value="${ep.title || ''}" placeholder="عنوان الحلقة">
          <input type="url" value="${ep.link1 || ''}" placeholder="رابط السيرفر 1">
          <input type="url" value="${ep.link2 || ''}" placeholder="رابط السيرفر 2">
          <input type="url" value="${ep.link3 || ''}" placeholder="رابط السيرفر 3">
        </div>
        <button class="delete-episode" onclick="this.parentElement.remove()">
          <i class="fas fa-trash"></i>
        </button>
      `;
      container.appendChild(episodeDiv);
    });
  } else {
    addNewEpisode();
  }
  
  // التبديل للوحة الإضافة
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  
  document.querySelector('.nav-btn').classList.add('active');
  document.getElementById('addPanel').classList.add('active');
}

// حذف مسلسل
function deleteSeries(id) {
  if (confirm('هل أنت متأكد من حذف هذا المسلسل؟')) {
    db.ref('series/' + id).remove()
      .then(() => alert('تم الحذف بنجاح'))
      .catch(error => alert('خطأ: ' + error.message));
  }
}

// تهيئة الصفحة
window.onload = function() {
  addNewEpisode();
};
</script>
