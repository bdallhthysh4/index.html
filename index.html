    <style type='text/css'>
      /* ===== التصميم المتقدم ===== */
      :root {
        --primary: #ff4757;
        --secondary: #0f0f1a;
        --accent: #1a1a2e;
        --text: #ffffff;
        --text-secondary: #b8b8b8;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Tajawal', 'Segoe UI', sans-serif;
      }
      
      body {
        background: var(--secondary);
        color: var(--text);
        min-height: 100vh;
      }
      
      /* شريط التحميل */
      #loading-bar {
        position: fixed;
        top: 0;
        left: 0;
        width: 0%;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), #ff6b6b, #ffa502);
        z-index: 9999;
        transition: width 0.3s ease;
        box-shadow: 0 0 10px var(--primary);
      }
      
      /* الهيدر */
      .header {
        background: rgba(10, 10, 20, 0.95);
        backdrop-filter: blur(10px);
        padding: 15px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 2px solid var(--primary);
        box-shadow: 0 2px 20px rgba(255, 71, 87, 0.2);
      }
      
      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
      }
      
      .logo {
        font-size: 28px;
        font-weight: bold;
        background: linear-gradient(45deg, #ff6b6b, var(--primary), #ffa502);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .logo i {
        font-size: 32px;
        color: var(--primary);
      }
      
      .search-box {
        flex: 1;
        max-width: 500px;
        display: flex;
        gap: 10px;
      }
      
      .search-box input {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: 0.3s;
      }
      
      .search-box input:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
      }
      
      .search-box button {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
      }
      
      .search-box button:hover {
        background: #ff6b6b;
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
      }
      
      /* التصنيفات */
      .categories {
        max-width: 1400px;
        margin: 30px auto;
        padding: 0 20px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .category-btn {
        padding: 10px 25px;
        border: 2px solid var(--primary);
        border-radius: 30px;
        background: transparent;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
        font-size: 16px;
        font-weight: 600;
      }
      
      .category-btn.active,
      .category-btn:hover {
        background: var(--primary);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
      }
      
      /* شبكة المسلسلات */
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      
      .section-title {
        font-size: 24px;
        margin-bottom: 20px;
        padding-right: 20px;
        position: relative;
      }
      
      .section-title::after {
        content: '';
        position: absolute;
        right: 0;
        bottom: -5px;
        width: 50px;
        height: 3px;
        background: var(--primary);
        border-radius: 3px;
      }
      
      .series-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
      
      .series-card {
        background: var(--accent);
        border-radius: 15px;
        overflow: hidden;
        transition: 0.3s;
        cursor: pointer;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .series-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3);
        border-color: var(--primary);
      }
      
      .series-image {
        width: 100%;
        aspect-ratio: 2/3;
        object-fit: cover;
        transition: 0.3s;
      }
      
      .series-card:hover .series-image {
        transform: scale(1.05);
      }
      
      .series-info {
        padding: 15px;
        background: linear-gradient(to top, var(--accent), transparent);
      }
      
      .series-title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      .series-meta {
        display: flex;
        justify-content: space-between;
        color: var(--text-secondary);
        font-size: 13px;
      }
      
      .series-rating {
        color: #ffd700;
      }
      
      .series-year {
        background: rgba(255, 71, 87, 0.2);
        padding: 2px 8px;
        border-radius: 20px;
      }
      
      /* نافذة المشاهدة */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(10px);
      }
      
      .modal.active {
        display: flex;
      }
      
      .modal-content {
        width: 90%;
        max-width: 1000px;
        background: var(--secondary);
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        border: 1px solid var(--primary);
      }
      
      .modal-header {
        padding: 20px;
        background: var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--primary);
      }
      
      .modal-header h2 {
        font-size: 20px;
        color: #fff;
      }
      
      .close-btn {
        background: var(--primary);
        border: none;
        color: #fff;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 20px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .close-btn:hover {
        transform: rotate(90deg);
        background: #ff6b6b;
      }
      
      .video-player {
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
      }
      
      video {
        width: 100%;
        height: 100%;
        outline: none;
      }
      
      .episodes-list {
        padding: 20px;
        max-height: 300px;
        overflow-y: auto;
        background: var(--accent);
      }
      
      .episode-item {
        padding: 12px 15px;
        background: rgba(255, 255, 255, 0.05);
        margin-bottom: 8px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .episode-item:hover {
        background: var(--primary);
        border-color: var(--primary);
      }
      
      .episode-item i {
        opacity: 0;
        transition: 0.3s;
      }
      
      .episode-item:hover i {
        opacity: 1;
      }
      
      /* تحميل */
      .loading {
        text-align: center;
        padding: 50px;
        font-size: 24px;
        color: var(--primary);
      }
      
      .loading i {
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* رسائل الخطأ */
      .error-message {
        text-align: center;
        padding: 50px;
        color: var(--primary);
        font-size: 18px;
      }
      
      .error-message i {
        font-size: 50px;
        margin-bottom: 20px;
        display: block;
      }
      
      /* التجاوب مع الجوال */
      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
        }
        
        .search-box {
          max-width: 100%;
        }
        
        .series-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 15px;
        }
      }
    </style>
  </head>

        cdn: 'https://pbcdn.aoneroom.com',
        
        // الهيدرات المطلوبة (مأخوذة من طلبك)
        headers: {
          'Accept-Encoding': 'gzip, deflate',
          'zip': '1',
          'fixed': '1',
          'count': '1',
          'appids': '2570',
          'ver': '3.0.0.5',
          'encrypt-level': '3',
          'Content-Type': 'application/x-www-form-urlencoded',
          'User-Agent': 'Dalvik/2.1.0 (Linux; U; Android 12; TECNO KI5k Build/SP1A.210812.016)',
          'Connection': 'Keep-Alive'
        },
        
        // قائمة الـ UUIDs المأخوذة من طلباتك

        // الـ encrypt-index المختلفة
        encryptIndices: [50, 26, 4, 48, 46, 33, 30, 12, 14, 34, 21, 10],
        
        // مفتاح فك التشفير (يجب استخراجه من التطبيق)
        // هذا مفتاح تجريبي - سيتم تحديثه بعد التحليل الكامل
        encryptionKey: 'moviebox_encryption_key_2025'
      };
      
      // قاعدة بيانات مؤقتة للمسلسلات (سيتم تحديثها من API)
      let moviesDatabase = [];
      let currentCategory = 'all';
      
      // دالة تحديث شريط التحميل
      function updateLoadingBar(percent) {
        document.getElementById('loading-bar').style.width = percent + '%';
      }
      
      // دالة فك تشفير بيانات API
      function decryptMovieBoxData(encryptedData, index) {
        try {
          updateLoadingBar(30);
          
          // محاولة فك التشفير باستخدام AES-CBC
          // هذه الخوارزمية مبنية على تحليل حركة المرور
          const key = CryptoJS.enc.Utf8.parse(MOVIEBOX_API.encryptionKey.padEnd(32, '0'));
          const iv = CryptoJS.enc.Utf8.parse('moviebox_iv_2025'.padEnd(16, '0'));
          
          // تجربة فك التشفير
          const decrypted = CryptoJS.AES.decrypt(encryptedData, key, {
            iv: iv,
            mode: CryptoJS.mode.CBC,
            padding: CryptoJS.pad.Pkcs7
          });
          
          const decryptedStr = decrypted.toString(CryptoJS.enc.Utf8);
          updateLoadingBar(60);
          
          if (decryptedStr) {
            return JSON.parse(decryptedStr);
          }
          
          // إذا فشل، جرب Base64
          const base64Decoded = atob(encryptedData);
          updateLoadingBar(60);
          return JSON.parse(base64Decoded);
          
        } catch (error) {
          console.error('خطأ في فك التشفير:', error);
          return null;
        }
      }
      
      // دالة جلب البيانات من API
      async function fetchFromMovieBox(payload, encryptIndex) {
        try {
          updateLoadingBar(10);
          
          const response = await $.ajax({
            url: MOVIEBOX_API.baseURL + MOVIEBOX_API.upload,
            method: 'POST',
            headers: {
              ...MOVIEBOX_API.headers,
              'encrypt-index': encryptIndex || MOVIEBOX_API.encryptIndices[Math.floor(Math.random() * MOVIEBOX_API.encryptIndices.length)],
              'uuid': MOVIEBOX_API.uuids[Math.floor(Math.random() * MOVIEBOX_API.uuids.length)]
            },
            data: payload,
            contentType: 'application/x-www-form-urlencoded',
            timeout: 10000
          });
          
          updateLoadingBar(80);
          
          // فك تشفير الاستجابة
          const decryptedData = decryptMovieBoxData(response, encryptIndex);
          updateLoadingBar(100);
          
          setTimeout(() => updateLoadingBar(0), 500);
          return decryptedData;
          
        } catch (error) {
          console.error('خطأ في الاتصال بالـ API:', error);
          updateLoadingBar(0);
          return null;
        }
      }

      // عرض المسلسلات في الشبكات المختلفة
      function displayMovies(movies) {
        // عرض الأكثر مشاهدة (أول 6)
        const trendingGrid = document.getElementById('trendingGrid');
        trendingGrid.innerHTML = '';
        movies.slice(0, 6).forEach(movie => {
          trendingGrid.appendChild(createMovieCard(movie));
        });
        
        // أحدث المسلسلات (آخر 6)
        const latestGrid = document.getElementById('latestGrid');
        latestGrid.innerHTML = '';
        [...movies].reverse().slice(0, 6).forEach(movie => {
          latestGrid.appendChild(createMovieCard(movie));
        });
        
        // موصى بها (عشوائي)
        const recommendedGrid = document.getElementById('recommendedGrid');
        recommendedGrid.innerHTML = '';
        const shuffled = [...movies].sort(() => 0.5 - Math.random());
        shuffled.slice(0, 6).forEach(movie => {
          recommendedGrid.appendChild(createMovieCard(movie));
        });
      }
      
      // إنشاء بطاقة مسلسل
      function createMovieCard(movie) {
        const card = document.createElement('div');
        card.className = 'series-card';
        card.onclick = () => openMovie(movie);
        
        card.innerHTML = `
          <img src="${movie.image}" alt="${movie.title}" class="series-image" onerror="this.src='https://via.placeholder.com/300x450?text=${encodeURIComponent(movie.title)}'">
          <div class="series-info">
            <div class="series-title">${movie.title}</div>
            <div class="series-meta">
              <span class="series-rating"><i class="fas fa-star"></i> ${movie.rating}</span>
              <span class="series-year">${movie.year}</span>
            </div>
          </div>
        `;
        
        return card;
      }
      
      // فتح مسلسل
      function openMovie(movie) {
        const modal = document.getElementById('videoModal');
        const modalTitle = document.getElementById('modalTitle');
        const episodesList = document.getElementById('episodesList');
        const videoPlayer = document.getElementById('videoPlayer');
        
        modalTitle.textContent = movie.title;
        
        // عرض الحلقات
        episodesList.innerHTML = '<h3 style="margin-bottom: 15px;">الحلقات</h3>';
        
        if (movie.episodes && movie.episodes.length > 0) {
          movie.episodes.forEach((ep, index) => {
            const epDiv = document.createElement('div');
            epDiv.className = 'episode-item';
            epDiv.innerHTML = `
              <span><i class="fas fa-play-circle"></i> ${ep.title || `الحلقة ${ep.num || index + 1}`}</span>
              <i class="fas fa-play"></i>
            `;
            epDiv.onclick = (e) => {
              e.stopPropagation();
              videoPlayer.src = ep.videoUrl;
              videoPlayer.play();
            };
            episodesList.appendChild(epDiv);
          });
        } else {
          episodesList.innerHTML += '<p>لا توجد حلقات متاحة</p>';
        }
        
        modal.classList.add('active');
      }
      
      // إغلاق النافذة
      function closeModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('active');
        video.pause();
        video.src = '';
      }
      
      // البحث
      function searchContent() {
        const query = document.getElementById('searchInput').value.trim();
        if (query.length < 2) return;
        
        const filtered = moviesDatabase.filter(m => 
          m.title.toLowerCase().includes(query.toLowerCase())
        );
        
        if (filtered.length > 0) {
          displayMovies(filtered);
        }
      }
      
      // تصفية حسب التصنيف
      function filterByCategory(category, btn) {
        currentCategory = category;
        
        // تحديث الأزرار
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (category === 'all') {
          displayMovies(moviesDatabase);
        } else {
          const filtered = moviesDatabase.filter(m => m.category === category);
          displayMovies(filtered.length > 0 ? filtered : moviesDatabase);
        }
      }
