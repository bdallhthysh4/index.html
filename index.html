<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بث مباشر</title>
<style>
body{
background:#000;
color:#fff;
text-align:center;
font-family:Arial;
}
video{
width:90%;
max-width:900px;
margin-top:20px;
border-radius:10px;
}
button{
padding:10px 20px;
font-size:18px;
background:#e50914;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<h2>📺 بث مباشر</h2>

<video id="video" controls autoplay></video>
<br><br>
<button onclick="startStream()">تشغيل البث</button>

<script>
function startStream(){

let video = document.getElementById("video");

let ws = new WebSocket("ws://117.55.202.104:60000/live?oid=0200bf7cb0lsfez69dd80tgrjty8nwd6");

ws.binaryType = "arraybuffer";

let mediaSource = new MediaSource();
video.src = URL.createObjectURL(mediaSource);

mediaSource.addEventListener("sourceopen", function(){

let sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.64001e, mp4a.40.2"');

ws.onmessage = function(event){
sourceBuffer.appendBuffer(new Uint8Array(event.data));
};

});

}
</script>

</body>
</html>
