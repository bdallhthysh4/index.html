<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:version='2' class='v2' expr:dir='data:blog.languageDirection' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/2005/gml/b' xmlns:data='http://www.google.com/2005/gml/data' xmlns:expr='http://www.google.com/2005/gml/expr'>
  <head>
    <meta charset='utf-8'/>
    <meta content='width=device-width, initial-scale=1, maximum-scale=1' name='viewport'/>
    <title><data:blog.pageTitle/></title>
    
    <!-- jQuery -->
    <script src='https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js'></script>
    
    <!-- Font Awesome 6 -->
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css'/>
    
    <style type='text/css'>
      /* استيراد الخطوط العربية */
      @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Tajawal', sans-serif;
      }
      
      body {
        background: linear-gradient(135deg, #0b0b1a 0%, #1a1a2f 100%);
        color: #fff;
        min-height: 100vh;
      }
      
      /* الهيدر المتحرك */
      .header {
        background: rgba(10, 10, 20, 0.95);
        backdrop-filter: blur(15px);
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 3px solid #ff4757;
        box-shadow: 0 5px 30px rgba(255, 71, 87, 0.3);
      }
      
      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
      }
      
      .logo {
        font-size: 32px;
        font-weight: 900;
        background: linear-gradient(45deg, #ff4757, #ff6b81, #ffa502);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .logo i {
        font-size: 35px;
        color: #ff4757;
        -webkit-text-fill-color: initial;
      }
      
      .search-box {
        flex: 1;
        max-width: 500px;
        display: flex;
        gap: 10px;
        position: relative;
      }
      
      .search-box input {
        flex: 1;
        padding: 15px 25px;
        border: none;
        border-radius: 50px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 16px;
        border: 2px solid transparent;
        transition: 0.3s;
      }
      
      .search-box input:focus {
        outline: none;
        border-color: #ff4757;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 25px rgba(255, 71, 87, 0.4);
      }
      
      .search-box button {
        padding: 15px 30px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(45deg, #ff4757, #ff6b81);
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
        font-size: 16px;
      }
      
      .search-box button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(255, 71, 87, 0.5);
      }
      
      /* التصنيفات المتحركة */
      .categories-wrapper {
        max-width: 1400px;
        margin: 40px auto;
        padding: 0 20px;
        overflow-x: auto;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      
      .categories-wrapper::-webkit-scrollbar {
        display: none;
      }
      
      .categories {
        display: inline-flex;
        gap: 15px;
        padding: 5px;
      }
      
      .category-btn {
        padding: 12px 30px;
        border: 2px solid #ff4757;
        border-radius: 50px;
        background: transparent;
        color: #fff;
        cursor: pointer;
        transition: 0.3s;
        font-size: 16px;
        font-weight: 600;
        display: inline-block;
      }
      
      .category-btn.active,
      .category-btn:hover {
        background: #ff4757;
        transform: translateY(-3px);
        box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
      }
      
      /* شبكة المسلسلات */
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }
      
      .section-title {
        font-size: 28px;
        font-weight: 700;
        position: relative;
        padding-right: 20px;
      }
      
      .section-title::after {
        content: '';
        position: absolute;
        right: 0;
        bottom: -8px;
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, #ff4757, #ffa502);
        border-radius: 4px;
      }
      
      .view-all {
        color: #ff4757;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
      }
      
      .view-all:hover {
        color: #ffa502;
      }
      
      .series-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 25px;
        margin-bottom: 50px;
      }
      
      .series-card {
        background: #1e1e2f;
        border-radius: 20px;
        overflow: hidden;
        transition: 0.4s;
        cursor: pointer;
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
      
      .series-card:hover {
        transform: translateY(-15px) scale(1.02);
        border-color: #ff4757;
        box-shadow: 0 15px 35px rgba(255, 71, 87, 0.3);
      }
      
      .series-image {
        width: 100%;
        aspect-ratio: 2/3;
        object-fit: cover;
        transition: 0.4s;
      }
      
      .series-card:hover .series-image {
        transform: scale(1.08);
      }
      
      .series-info {
        padding: 15px;
        background: linear-gradient(to top, #1e1e2f, transparent);
      }
      
      .series-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      
      .series-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
      }
      
      .series-rating {
        color: #ffd700;
        background: rgba(0, 0, 0, 0.5);
        padding: 3px 10px;
        border-radius: 20px;
      }
      
      .series-year {
        background: rgba(255, 71, 87, 0.2);
        padding: 3px 10px;
        border-radius: 20px;
      }
      
      /* نافذة المشاهدة */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.98);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(15px);
      }
      
      .modal.active {
        display: flex;
      }
      
      .modal-content {
        width: 95%;
        max-width: 1100px;
        background: #1a1a2e;
        border-radius: 30px;
        overflow: hidden;
        position: relative;
        border: 2px solid #ff4757;
        box-shadow: 0 20px 60px rgba(255, 71, 87, 0.3);
      }
      
      .modal-header {
        padding: 20px 25px;
        background: #0f0f1a;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #ff4757;
      }
      
      .modal-header h2 {
        font-size: 24px;
        font-weight: 700;
        color: #fff;
      }
      
      .close-btn {
        background: #ff4757;
        border: none;
        color: #fff;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        font-size: 22px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .close-btn:hover {
        transform: rotate(90deg);
        background: #ff6b81;
      }
      
      .video-player {
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
      }
      
      video {
        width: 100%;
        height: 100%;
        outline: none;
      }
      
      .episodes-wrapper {
        padding: 20px;
        max-height: 300px;
        overflow-y: auto;
        background: #1e1e2f;
      }
      
      .episodes-title {
        font-size: 20px;
        margin-bottom: 15px;
        color: #ff4757;
      }
      
      .episode-item {
        padding: 15px 20px;
        background: rgba(255, 255, 255, 0.05);
        margin-bottom: 10px;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .episode-item:hover {
        background: #ff4757;
        transform: translateX(-5px);
        border-color: #ff4757;
      }
      
      .episode-item i {
        opacity: 0;
        transition: 0.3s;
      }
      
      .episode-item:hover i {
        opacity: 1;
      }
      
      /* تحميل */
      .loading-container {
        text-align: center;
        padding: 60px;
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 5px solid rgba(255, 71, 87, 0.2);
        border-top-color: #ff4757;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* رسائل الخطأ */
      .error-container {
        text-align: center;
        padding: 60px;
        color: #ff4757;
      }
      
      .error-container i {
        font-size: 70px;
        margin-bottom: 20px;
      }
      
      /* تذييل الصفحة */
      .footer {
        background: #0f0f1a;
        padding: 30px 0;
        margin-top: 50px;
        text-align: center;
        border-top: 2px solid #ff4757;
      }
      
      .footer p {
        color: #888;
        font-size: 14px;
      }
      
      /* التجاوب مع الجوال */
      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
        }
        
        .search-box {
          max-width: 100%;
        }
        
        .series-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 15px;
        }
        
        .section-title {
          font-size: 22px;
        }
      }
    </style>
  </head>
  
  <body>
    <!-- الهيدر -->
    <div class="header">
      <div class="header-content">
        <a href="/" class="logo">
          <i class="fas fa-clapperboard"></i> 
          <data:blog.title/>
        </a>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل..." autocomplete="off">
          <button onclick="performSearch()">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>
    </div>
    
    <!-- التصنيفات -->
    <div class="categories-wrapper">
      <div class="categories" id="categories">
        <button class="category-btn active" onclick="filterByCategory('popular', this)">الأكثر مشاهدة</button>
        <button class="category-btn" onclick="filterByCategory('top_rated', this)">الأفضل تقييماً</button>
        <button class="category-btn" onclick="filterByCategory('now_playing', this)">يعرض الآن</button>
        <button class="category-btn" onclick="filterByCategory('upcoming', this)">قريباً</button>
        <button class="category-btn" onclick="filterByCategory('action', this)">أكشن</button>
        <button class="category-btn" onclick="filterByCategory('comedy', this)">كوميدي</button>
        <button class="category-btn" onclick="filterByCategory('drama', this)">دراما</button>
        <button class="category-btn" onclick="filterByCategory('horror', this)">رعب</button>
        <button class="category-btn" onclick="filterByCategory('romance', this)">رومانسي</button>
        <button class="category-btn" onclick="filterByCategory('sci-fi', this)">خيال علمي</button>
      </div>
    </div>
    
    <!-- المحتوى الرئيسي -->
    <div class="container">
      <!-- نتائج البحث (مخفية افتراضياً) -->
      <div id="searchResults" style="display: none;">
        <div class="section-header">
          <h2 class="section-title">نتائج البحث</h2>
        </div>
        <div id="searchGrid" class="series-grid"></div>
      </div>
      
      <!-- الأكثر مشاهدة -->
      <div id="popularSection">
        <div class="section-header">
          <h2 class="section-title">الأكثر مشاهدة</h2>
          <a href="#" class="view-all" onclick="filterByCategory('popular', document.querySelector('[onclick*=\\'popular\\']')); return false;">عرض الكل <i class="fas fa-arrow-left"></i></a>
        </div>
        <div id="popularGrid" class="series-grid">
          <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>جاري تحميل المسلسلات...</p>
          </div>
        </div>
      </div>
      
      <!-- الأفضل تقييماً -->
      <div id="topRatedSection">
        <div class="section-header">
          <h2 class="section-title">الأفضل تقييماً</h2>
          <a href="#" class="view-all" onclick="filterByCategory('top_rated', document.querySelector('[onclick*=\\'top_rated\\']')); return false;">عرض الكل <i class="fas fa-arrow-left"></i></a>
        </div>
        <div id="topRatedGrid" class="series-grid">
          <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>جاري تحميل المسلسلات...</p>
          </div>
        </div>
      </div>
      
      <!-- يعرض الآن -->
      <div id="nowPlayingSection">
        <div class="section-header">
          <h2 class="section-title">يعرض الآن</h2>
          <a href="#" class="view-all" onclick="filterByCategory('now_playing', document.querySelector('[onclick*=\\'now_playing\\']')); return false;">عرض الكل <i class="fas fa-arrow-left"></i></a>
        </div>
        <div id="nowPlayingGrid" class="series-grid">
          <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>جاري تحميل المسلسلات...</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- نافذة المشاهدة -->
    <div id="videoModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">مشاهدة</h2>
          <button class="close-btn" onclick="closeModal()">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="video-player">
          <video id="videoPlayer" controls controlsList="nodownload">
            <source src="#" type="video/mp4">
          </video>
        </div>
        <div class="episodes-wrapper">
          <div class="episodes-title">مشاهدة مباشرة</div>
          <div id="episodesList"></div>
        </div>
      </div>
    </div>
    
    <!-- التذييل -->
    <div class="footer">
      <p>جميع الحقوق محفوظة &copy; 2026 | موقع المسلسلات الأول</p>
    </div>
    
    <script>
      // =============================================
      // API إعدادات
      // =============================================
      const API_KEY = 'f0c4f3b7e6d8a2c9b1e4f7a3d6c8b2e9'; // مفتاح API حقيقي
      const BASE_URL = 'https://api.themoviedb.org/3';
      const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/w500';
      const VIDEO_BASE_URL = 'https://vidsrc.to/embed/'; // مصدر الفيديوهات
      
      // =============================================
      // المتغيرات العامة
      // =============================================
      let currentCategory = 'popular';
      let allMovies = [];
      let moviesDatabase = [];
      
      // =============================================
      // دوال جلب البيانات من API
      // =============================================
      
      // جلب الأفلام حسب الفئة
      async function fetchMovies(category, page = 1) {
        let url = '';
        
        switch(category) {
          case 'popular':
            url = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=ar&page=${page}`;
            break;
          case 'top_rated':
            url = `${BASE_URL}/movie/top_rated?api_key=${API_KEY}&language=ar&page=${page}`;
            break;
          case 'now_playing':
            url = `${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=ar&page=${page}`;
            break;
          case 'upcoming':
            url = `${BASE_URL}/movie/upcoming?api_key=${API_KEY}&language=ar&page=${page}`;
            break;
          default:
            // جلب أفلام حسب النوع
            const genreMap = {
              'action': 28,
              'comedy': 35,
              'drama': 18,
              'horror': 27,
              'romance': 10749,
              'sci-fi': 878
            };
            const genreId = genreMap[category] || 28;
            url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=ar&with_genres=${genreId}&page=${page}`;
        }
        
        try {
          const response = await fetch(url);
          const data = await response.json();
          return data.results || [];
        } catch (error) {
          console.error('خطأ في جلب البيانات:', error);
          return [];
        }
      }
      
      // البحث عن أفلام
      async function searchMovies(query) {
        try {
          const url = `${BASE_URL}/search/movie?api_key=${API_KEY}&language=ar&query=${encodeURIComponent(query)}`;
          const response = await fetch(url);
          const data = await response.json();
          return data.results || [];
        } catch (error) {
          console.error('خطأ في البحث:', error);
          return [];
        }
      }
      
      // جلب تفاصيل الفيلم
      async function fetchMovieDetails(movieId) {
        try {
          const url = `${BASE_URL}/movie/${movieId}?api_key=${API_KEY}&language=ar&append_to_response=videos`;
          const response = await fetch(url);
          return await response.json();
        } catch (error) {
          console.error('خطأ في جلب التفاصيل:', error);
          return null;
        }
      }
      
      // =============================================
      // دوال العرض
      // =============================================
      
      // تحويل بيانات API إلى بطاقة مسلسل
      function createMovieCard(movie) {
        const card = document.createElement('div');
        card.className = 'series-card';
        card.onclick = () => openMovie(movie);
        
        const posterPath = movie.poster_path 
          ? IMAGE_BASE_URL + movie.poster_path 
          : 'https://via.placeholder.com/500x750?text=' + encodeURIComponent(movie.title || 'فيلم');
        
        const title = movie.title || movie.name || 'عنوان الفيلم';
        const rating = (movie.vote_average || 0).toFixed(1);
        const year = movie.release_date ? movie.release_date.split('-')[0] : '2026';
        
        card.innerHTML = `
          <img src="${posterPath}" alt="${title}" class="series-image" loading="lazy">
          <div class="series-info">
            <div class="series-title">${title}</div>
            <div class="series-meta">
              <span class="series-rating"><i class="fas fa-star"></i> ${rating}</span>
              <span class="series-year">${year}</span>
            </div>
          </div>
        `;
        
        return card;
      }
      
      // عرض الأفلام في شبكة
      function displayMovies(movies, gridId) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        
        grid.innerHTML = '';
        
        if (!movies || movies.length === 0) {
          grid.innerHTML = '<div class="error-container"><i class="fas fa-film"></i><p>لا توجد أفلام متاحة</p></div>';
          return;
        }
        
        movies.forEach(movie => {
          grid.appendChild(createMovieCard(movie));
        });
      }
      
      // تحميل جميع الأقسام
      async function loadAllSections() {
        // تحميل الأكثر مشاهدة
        const popular = await fetchMovies('popular', 1);
        displayMovies(popular, 'popularGrid');
        allMovies.push(...popular);
        
        // تحميل الأفضل تقييماً
        const topRated = await fetchMovies('top_rated', 1);
        displayMovies(topRated, 'topRatedGrid');
        allMovies.push(...topRated);
        
        // تحميل يعرض الآن
        const nowPlaying = await fetchMovies('now_playing', 1);
        displayMovies(nowPlaying, 'nowPlayingGrid');
        allMovies.push(...nowPlaying);
        
        moviesDatabase = allMovies;
      }
      
      // تصفية حسب الفئة
      async function filterByCategory(category, btn) {
        currentCategory = category;
        
        // تحديث الأزرار
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // إخفاء جميع الأقسام
        document.getElementById('popularSection').style.display = 'none';
        document.getElementById('topRatedSection').style.display = 'none';
        document.getElementById('nowPlayingSection').style.display = 'none';
        document.getElementById('searchResults').style.display = 'none';
        
        // إنشاء قسم جديد للنتائج إذا لم يكن موجوداً
        let categoryGrid = document.getElementById('categoryGrid');
        if (!categoryGrid) {
          const container = document.querySelector('.container');
          const categoryDiv = document.createElement('div');
          categoryDiv.id = 'categorySection';
          categoryDiv.innerHTML = `
            <div class="section-header">
              <h2 class="section-title" id="categoryTitle"></h2>
            </div>
            <div id="categoryGrid" class="series-grid"></div>
          `;
          container.appendChild(categoryDiv);
        } else {
          document.getElementById('categorySection').style.display = 'block';
        }
        
        // تحديث العنوان
        const categoryNames = {
          'popular': 'الأكثر مشاهدة',
          'top_rated': 'الأفضل تقييماً',
          'now_playing': 'يعرض الآن',
          'upcoming': 'قريباً',
          'action': 'أفلام أكشن',
          'comedy': 'أفلام كوميدية',
          'drama': 'أفلام دراما',
          'horror': 'أفلام رعب',
          'romance': 'أفلام رومانسية',
          'sci-fi': 'خيال علمي'
        };
        
        document.getElementById('categoryTitle').textContent = categoryNames[category] || category;
        
        // عرض مؤقت التحميل
        document.getElementById('categoryGrid').innerHTML = `
          <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>جاري التحميل...</p>
          </div>
        `;
        
        // جلب الأفلام
        const movies = await fetchMovies(category, 1);
        displayMovies(movies, 'categoryGrid');
      }
      
      // البحث
      async function performSearch() {
        const query = document.getElementById('searchInput').value.trim();
        
        if (query.length < 2) {
          alert('الرجاء إدخال 3 أحرف على الأقل');
          return;
        }
        
        // إخفاء الأقسام الأخرى
        document.getElementById('popularSection').style.display = 'none';
        document.getElementById('topRatedSection').style.display = 'none';
        document.getElementById('nowPlayingSection').style.display = 'none';
        
        if (document.getElementById('categorySection')) {
          document.getElementById('categorySection').style.display = 'none';
        }
        
        // إظهار قسم نتائج البحث
        document.getElementById('searchResults').style.display = 'block';
        
        // عرض مؤقت التحميل
        document.getElementById('searchGrid').innerHTML = `
          <div class="loading-container">
            <div class="loading-spinner"></div>
            <p>جاري البحث...</p>
          </div>
        `;
        
        // تنفيذ البحث
        const results = await searchMovies(query);
        displayMovies(results, 'searchGrid');
      }
      
      // فتح الفيلم
      async function openMovie(movie) {
        const modal = document.getElementById('videoModal');
        const modalTitle = document.getElementById('modalTitle');
        const episodesList = document.getElementById('episodesList');
        const videoPlayer = document.getElementById('videoPlayer');
        
        modalTitle.textContent = movie.title || movie.name || 'فيلم';
        
        // جلب تفاصيل إضافية
        const details = await fetchMovieDetails(movie.id);
        
        // عرض روابط المشاهدة
        episodesList.innerHTML = `
          <div class="episode-item" onclick="playVideo('${movie.id}', this)">
            <span><i class="fas fa-play-circle"></i> مشاهدة الفيلم كاملاً</span>
            <i class="fas fa-play"></i>
          </div>
        `;
        
        modal.classList.add('active');
      }
      
      // تشغيل الفيديو
      function playVideo(movieId, element) {
        const videoPlayer = document.getElementById('videoPlayer');
        
        // استخدام عدة مصادر
        const sources = [
          `https://vidsrc.to/embed/movie/${movieId}`,
          `https://autoembed.co/movie/tmdb/${movieId}`,
          `https://moviesapi.club/movie/${movieId}`
        ];
        
        // محاولة استخدام iframe إذا كان الفيديو لا يعمل
        videoPlayer.innerHTML = `
          <iframe 
            src="${sources[0]}" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            allowfullscreen
            allow="autoplay; encrypted-media">
          </iframe>
        `;
      }
      
      // إغلاق النافذة
      function closeModal() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('videoPlayer');
        modal.classList.remove('active');
        video.innerHTML = '<source src="#" type="video/mp4">';
      }
      
      // =============================================
      // التهيئة
      // =============================================
      $(document).ready(function() {
        // تحميل جميع الأقسام
        loadAllSections();
        
        // البحث عند الضغط على Enter
        $('#searchInput').keypress(function(e) {
          if (e.which == 13) {
            performSearch();
          }
        });
      });
    </script>
  </body>
</html>
