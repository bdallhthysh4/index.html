<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Worm GPT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#050505;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* header */

.header{
height:60px;
background:#0c0c0c;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #1a1a1a;
}

.logo{
font-size:22px;
font-weight:900;
color:#ff0033;
letter-spacing:1px;
}

/* chat */

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

/* messages */

.msg{
max-width:75%;
padding:14px 16px;
border-radius:16px;
font-size:15px;
line-height:1.6;
animation:fade .3s;
}

.user{
background:#ff0033;
align-self:flex-end;
border-bottom-right-radius:5px;
}

.bot{
background:#111;
border:1px solid #1f1f1f;
align-self:flex-start;
border-bottom-left-radius:5px;
}

/* input */

.input-area{
padding:15px;
background:#0c0c0c;
border-top:1px solid #1a1a1a;
display:flex;
gap:10px;
}

textarea{
flex:1;
height:50px;
background:#111;
border:1px solid #222;
border-radius:10px;
color:white;
padding:10px;
resize:none;
outline:none;
}

textarea:focus{
border-color:#ff0033;
}

button{
width:70px;
border:none;
border-radius:10px;
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff224d;
}

/* loading */

.typing{
color:#ff0033;
font-size:14px;
padding:10px;
}

/* animation */

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="header">
<div class="logo">Worm GPT</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">

<textarea id="msg" placeholder="اكتب رسالتك..."></textarea>

<button onclick="send()">إرسال</button>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby7eGm_8j9KC9yvpJBVJxe1VtiYDdyo01JNOhUIHhy9ACK9v0cP1Ytmpjv16PtOMI4u/exec";

const API_KEY="DarkAI-DeepAI-EFF939A9130A0ABAE3A7414D";

const chat=document.getElementById("chat");

function addMessage(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

async function send(){

const input=document.getElementById("msg");

const text=input.value.trim();

if(!text)return;

addMessage(text,"user");

input.value="";

const typing=document.createElement("div");

typing.className="typing";

typing.innerText="Worm GPT يفكر...";

chat.appendChild(typing);

chat.scrollTop=chat.scrollHeight;

try{

const res=await fetch(API_URL+"?msg="+encodeURIComponent(text)+"&key="+API_KEY);

const data=await res.text();

typing.remove();

let reply=data;

try{

const json=JSON.parse(data);

if(json.response){

reply=json.response;

}

}catch(e){}

addMessage(reply,"bot");

}catch(e){

typing.remove();

addMessage("حدث خطأ في الاتصال","bot");

}

}

</script>

</body>
</html>
