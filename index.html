<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Arabic Channels</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#search{
width:90%;
max-width:500px;
padding:10px;
border:none;
border-radius:8px;
margin:15px auto;
display:block;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:300px 1fr;
height:calc(100vh - 120px);
}

.channels{
overflow-y:auto;
background:#020617;
padding:10px;
}

.channel{
padding:10px;
margin:5px 0;
background:#1e293b;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

.channel:hover{
background:#334155;
}

.player{
display:flex;
align-items:center;
justify-content:center;
background:#000;
}

video{
width:100%;
height:100%;
max-height:80vh;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
.channels{
height:300px;
}
}
</style>
</head>

<body>

<header>📺 IPTV Channels</header>

<input type="text" id="search" placeholder="بحث عن قناة...">

<div class="container">

<div class="channels" id="channels"></div>

<div class="player">
<video
id="player"
class="video-js vjs-big-play-centered"
controls
autoplay
></video>
</div>

</div>

<script>

const player = videojs('player');

let channelsData=[];

async function loadChannels(){

const res = await fetch("https://iptv-org.github.io/api/channels.json");
const data = await res.json();

channelsData = data
.filter(c => !c.closed);

sortChannels();
renderChannels(channelsData);

}

function sortChannels(){

channelsData.sort((a,b)=>{

const aArabic = ["SA","AE","EG","IQ","MA","DZ","SY","JO","KW","QA","BH","OM","TN","LY","YE","PS"].includes(a.country);
const bArabic = ["SA","AE","EG","IQ","MA","DZ","SY","JO","KW","QA","BH","OM","TN","LY","YE","PS"].includes(b.country);

if(aArabic && !bArabic) return -1;
if(!aArabic && bArabic) return 1;

return a.name.localeCompare(b.name);

});

}

function renderChannels(list){

const container=document.getElementById("channels");
container.innerHTML="";

list.forEach(c=>{

const div=document.createElement("div");
div.className="channel";
div.textContent=c.name;

div.onclick=()=>playChannel(c);

container.appendChild(div);

});

}

async function playChannel(channel){

try{

const streams = await fetch("https://iptv-org.github.io/api/streams.json");
const data = await streams.json();

const stream = data.find(s => s.channel === channel.id);

if(!stream){
alert("لا يوجد بث لهذه القناة");
return;
}

player.src({
src: stream.url,
type:"application/x-mpegURL"
});

player.play();

}catch(e){
alert("خطأ في تشغيل القناة");
}

}

document.getElementById("search").addEventListener("input",e=>{

const val = e.target.value.toLowerCase();

const filtered = channelsData.filter(c =>
c.name.toLowerCase().includes(val)
);

renderChannels(filtered);

});

loadChannels();

</script>

</body>
</html>
