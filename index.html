<b:skin><![CDATA[

  .btn-copy {

  @keyframes fadeIn {

  .error-msg {

  .success-msg {
    color: var(--primary);
    background: rgba(0,255,136,0.1);
    padding: 15px;
    border-radius: 10px;
    border-right: 4px solid var(--primary);

  .example-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: #fff;
    padding: 5px 10px;

  }

  .example-btn:hover {

]]></b:skin>

<div class='ai-container'>
  <div class='header'>
    <h2>حكايتنا Reqable AI ⚡</h2>

  <div class='input-wrapper'>
    <textarea id='requestInput' placeholder='الصق طلب HTTP من Reqable هنا...&#10;&#10;مثال:&#10;GET /hls/uncltvdalcrt55h3jyvbtu52e5vu3ozgjxjchk7qpyluxusddh4oyc6bjgwq/seg-73-v1-a1.ts HTTP/1.1&#10;Host: s21.mwdy.club'>GET /hls/uncltvdalcrt55h3jyvbtu52e5vu3ozgjxjchk7qpyluxusddh4oyc6bjgwq/seg-73-v1-a1.ts HTTP/1.1
Host: s21.mwdy.club
User-Agent: Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36

Referer: https://mwdy.cc/</textarea>
  </div>
  
  <div style='text-align:center; margin-bottom:15px;'>
    <span class='example-btn' onclick='loadExample1()'>📋 مثال 1 (mwdy)</span>
    <span class='example-btn' onclick='loadExample2()'>📋 مثال 2 (قصة عشق)</span>

  <div class='loading' id='wait'>⚡ الذكاء الاصطناعي يحلل الطلب...</div>
  
  <div id='resBox'>
    <!-- النتائج ستظهر هنا -->
  </div>
</div>

<b:section id='main' showaddelement='false'/>

<script>
// <![CDATA[

// ========== ذكاء اصطناعي لتحليل طلبات Reqable ==========
class ReqableAI {
  constructor() {
    this.method = "GET";
    this.host = "";
    this.path = "";
    this.headers = {};
    this.fullUrl = "";
    this.parsed = false;
  }

  // تحليل نص الطلب
  parseRequest(requestText) {
    const lines = requestText.trim().split('\n');
    if (lines.length === 0) return false;

    // تحليل السطر الأول
    const firstLine = lines[0].trim();
    const firstLineParts = firstLine.split(' ');
    if (firstLineParts.length >= 2) {
      this.method = firstLineParts[0];
      this.path = firstLineParts[1];
    }

    // تحليل الهيدرات
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (line.includes(':')) {
        const colonIndex = line.indexOf(':');
        const key = line.substring(0, colonIndex).trim().toLowerCase();
        const value = line.substring(colonIndex + 1).trim();
        this.headers[key] = value;
        
        if (key === 'host') {
          this.host = value;
        }
      } else if (line.startsWith('http')) {
        // إذا كان هناك رابط مباشر في السطر
        this.fullUrl = line;
      }
    }

    // بناء الرابط الكامل
    if (!this.fullUrl && this.host && this.path) {
      const scheme = this.headers['origin']?.startsWith('https') ? 'https' : 'http';
      this.fullUrl = `${scheme}://${this.host}${this.path}`;
    }

    this.parsed = true;
    return true;
  }

  // استخراج معلومات المسلسل
  extractSeriesInfo() {
    if (!this.parsed) return null;

    const info = {
      method: this.method,
      host: this.host,
      path: this.path,
      fullUrl: this.fullUrl,
      server: null,
      seriesId: null,
      episode: null,
      m3u8Url: null,
      basePath: null,
      siteType: 'unknown',
      possibleServers: []
    };

    // أنماط البحث الذكية للمواقع المختلفة
    const patterns = [
      {
        name: 'mwdy',
        pattern: /(?:https?:\/\/)?(s\d+\.mwdy\.club)\/hls\/([a-zA-Z0-9]+)\/seg-(\d+)-v1-a1\.ts/i,
        m3u8Format: (server, id) => `https://${server}/hls/${id}/index.m3u8`,
        tsFormat: (server, id, ep) => `https://${server}/hls/${id}/seg-${ep}-v1-a1.ts`
      },
      {
        name: '3isk (قصة عشق)',
        pattern: /(?:https?:\/\/)?(s\d+\.3isk\.(?:tv|info|cc|online))\/hls\/([a-zA-Z0-9]+)\/seg-(\d+)-v1-a1\.ts/i,
        m3u8Format: (server, id) => `https://${server}/hls/${id}/index.m3u8`,
        tsFormat: (server, id, ep) => `https://${server}/hls/${id}/seg-${ep}-v1-a1.ts`
      },
      {
        name: 'qrmzi (قرمزي)',
        pattern: /(?:https?:\/\/)?(w\d+\.qrmzi\.site)\/hls\/([a-zA-Z0-9]+)\/seg-(\d+)\.ts/i,
        m3u8Format: (server, id) => `https://${server}/hls/${id}/master.m3u8`,
        tsFormat: (server, id, ep) => `https://${server}/hls/${id}/seg-${ep}.ts`
      },
      {
        name: 'vidcdn',
        pattern: /(?:https?:\/\/)?([^\/]+)\/hls\/([a-zA-Z0-9]+)\/seg-(\d+)[^\.]*\.ts/i,
        m3u8Format: (server, id) => `https://${server}/hls/${id}/playlist.m3u8`,
        tsFormat: (server, id, ep) => `https://${server}/hls/${id}/seg-${ep}.ts`
      }
    ];

    for (const pattern of patterns) {
      const match = this.fullUrl.match(pattern.pattern);
      if (match) {
        info.siteType = pattern.name;
        info.server = match[1];
        info.seriesId = match[2];
        info.episode = parseInt(match[3]);
        info.m3u8Url = pattern.m3u8Format(info.server, info.seriesId);
        
        // توليد سيرفرات بديلة
        const baseServer = info.server.match(/\d+/)?.[0] || '21';
        const baseNum = parseInt(baseServer);
        for (let i = 1; i <= 5; i++) {
          const altServer = info.server.replace(/\d+/, (baseNum + i).toString());
          info.possibleServers.push({
            server: altServer,
            m3u8: pattern.m3u8Format(altServer, info.seriesId),
            ts: pattern.tsFormat(altServer, info.seriesId, info.episode)
          });
        }
        break;
      }
    }

    return info;
  }

  // تحليل اسم المسلسل من الرابط (ذكاء اصطناعي)
  guessSeriesName(seriesId) {
    // قواعد بيانات أسماء المسلسلات (يمكن توسيعها)
    const seriesNames = {
      'uncltvdalcrt55h3jyvbtu52e5vu3ozgjxjchk7qpyluxusddh4oyc6bjgwq': 'حكاية روح',
      'kizilcik-serbeti-2025': 'شراب التوت',
      'doktor-2026': 'الطبيب',
      'guller-ve-gunahlar': 'ورود وذنوب',
      'sahipsizler': 'المشردون',
      'kurulus-osman': 'المؤسس عثمان',
      'dirilis-ertugrul': 'قيامة أرطغرل',
      'teskilat': 'المنظمة',
      'kara-para-ask': 'العشق المشبوه',
      'no-309': 'الغرفة 309'
    };

    // بحث ذكي في المعرف
    for (const [id, name] of Object.entries(seriesNames)) {
      if (seriesId.includes(id) || id.includes(seriesId)) {
        return name;
      }
    }

    // إذا لم نجد، نحاول تحليل المعرف
    if (seriesId.length > 20) {
      return "مسلسل غير معروف (معرف طويل)";
    } else {
      return seriesId.replace(/-/g, ' ').replace(/\d+/g, '').trim() || "مسلسل غير معروف";
    }
  }
}

// ========== دوال الواجهة ==========
let currentInfo = null;

function loadExample1() {
  document.getElementById('requestInput').value = `GET /hls/uncltvdalcrt55h3jyvbtu52e5vu3ozgjxjchk7qpyluxusddh4oyc6bjgwq/seg-73-v1-a1.ts HTTP/1.1
Host: s21.mwdy.club
User-Agent: Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36
Accept: */*
Referer: https://mwdy.cc/`;
}

function loadExample2() {
  document.getElementById('requestInput').value = `GET /hls/3isk1234567890abcdef/seg-5-v1-a1.ts HTTP/1.1
Host: s5.3isk.tv
User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
Accept: */*
Referer: https://3isk.tv/`;
}

function loadExample3() {
  document.getElementById('requestInput').value = `GET /hls/qrmzi12345/seg-12.ts HTTP/1.1
Host: w1.qrmzi.site
User-Agent: Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36
Accept: */*
Referer: https://qrmzi.site/`;
}

function clearInput() {
  document.getElementById('requestInput').value = '';
}

function extractLinks() {
  const requestText = document.getElementById('requestInput').value.trim();
  const box = document.getElementById('resBox');
  const wait = document.getElementById('wait');
  const btn = document.getElementById('btn');

  if (!requestText) {
    alert('الرجاء لصق طلب HTTP من Reqable');
    return;
  }

  box.style.display = "none";
  wait.style.display = "block";
  btn.disabled = true;

  // محاكاة معالجة الذكاء الاصطناعي
  setTimeout(() => {
    try {
      const ai = new ReqableAI();
      ai.parseRequest(requestText);
      const info = ai.extractSeriesInfo();

      if (!info.seriesId) {
        // محاولة استخراج الرابط مباشرة من النص
        const urlMatch = requestText.match(/(https?:\/\/[^\s]+)/);
        if (urlMatch) {
          ai.fullUrl = urlMatch[1];
          const reExtract = ai.extractSeriesInfo();
          if (reExtract.seriesId) {
            Object.assign(info, reExtract);
          }
        }
      }

      currentInfo = info;

      if (!info.seriesId) {
        box.style.display = "block";
        box.innerHTML = `
          <div class="error-msg">
            ⚠️ لم يتم العثور على معلومات المسلسل في الطلب.<br><br>
            <b>الرابط المستخرج:</b><br>
            <span style="direction:ltr; display:block;">${info.fullUrl || 'غير موجود'}</span>
          </div>
        `;
        wait.style.display = "none";
        btn.disabled = false;
        return;
      }

      // توليد اسم المسلسل
      const seriesName = ai.guessSeriesName(info.seriesId);

      // عرض النتائج
      box.style.display = "block";
      box.innerHTML = `
        <div class="success-msg">
          ✅ تم التحليل بنجاح بواسطة الذكاء الاصطناعي!
        </div>
        
        <div class="info-grid">
          <div class="info-card">
            <div class="info-label">🌐 السيرفر</div>
            <div class="info-value">${info.server}</div>
          </div>
          <div class="info-card">
            <div class="info-label">🎬 اسم المسلسل</div>
            <div class="info-value">${seriesName}</div>
          </div>
          <div class="info-card">
            <div class="info-label">🔢 رقم الحلقة</div>
            <div class="info-value">${info.episode || 'غير معروف'}</div>
          </div>
          <div class="info-card">
            <div class="info-label">🏷️ نوع الموقع</div>
            <div class="info-value">${info.siteType}</div>
          </div>
        </div>

        <div style="margin:20px 0;">
          <h4 style="color: var(--primary);">🔗 رابط M3U8 (للمشاهدة):</h4>
          <div class="link-box" id="m3u8Link">${info.m3u8Url}</div>
          <button class="btn-copy" onclick="copyText('${info.m3u8Url}')">📋 نسخ رابط M3U8</button>
        </div>

        <div style="margin:20px 0;">
          <h4 style="color: var(--secondary);">📥 رابط TS (للتحميل):</h4>
          <div class="link-box" id="tsLink">https://${info.server}/hls/${info.seriesId}/seg-${info.episode || 1}-v1-a1.ts</div>
          <button class="btn-copy" onclick="copyText('https://${info.server}/hls/${info.seriesId}/seg-${info.episode || 1}-v1-a1.ts')">📋 نسخ رابط TS</button>
        </div>

        <div style="margin:20px 0;">
          <h4 style="color: var(--warning);">🔄 سيرفرات بديلة (قد تعمل):</h4>
          <div class="btn-group">
            ${info.possibleServers.map(s => `
              <span class="server-badge" onclick="useServer('${s.m3u8}', '${s.ts}')">${s.server}</span>
            `).join('')}
          </div>
        </div>

        <div style="margin:20px 0;">
          <h4 style="color: var(--accent);">🎯 اختيار حلقة أخرى:</h4>
          <div class="episode-selector" id="episodeSelector">
            ${Array.from({length: 10}, (_, i) => `
              <div class="episode-btn" onclick="selectEpisode(${i+1}, '${info.server}', '${info.seriesId}')">${i+1}</div>
            `).join('')}
          </div>
        </div>

        <div style="margin-top:20px; padding:10px; background:rgba(255,255,255,0.03); border-radius:10px;">
          <b>📊 معلومات إضافية:</b><br>
          • المسار الكامل: ${info.path}<br>
          • طريقة الطلب: ${info.method}<br>
          • الهوست الأصلي: ${info.host}<br>
          • معرف المسلسل: ${info.seriesId}
        </div>
      `;

    } catch (e) {
      box.style.display = "block";
      box.innerHTML = `<div class="error-msg">⚠️ خطأ في التحليل: ${e.message}</div>`;
    } finally {
      wait.style.display = "none";
      btn.disabled = false;
    }
  }, 1500); // محاكاة تأخير الذكاء الاصطناعي
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ تم النسخ!');
  }).catch(() => {
    alert('❌ فشل النسخ');
  });
}

function useServer(m3u8, ts) {
  document.getElementById('m3u8Link').innerText = m3u8;
  document.getElementById('tsLink').innerText = ts;
  
  // تحديث أزرار النسخ
