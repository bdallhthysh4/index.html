<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html dir='rtl' lang='ar'>
<head>
  <meta charset='UTF-8'/>
  <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes' name='viewport'/>
  <meta content='no-referrer' name='referrer'/>
  <title>لوحة تحكم الأدمن - حكايتنا</title>
  <meta content='لوحة تحكم لإدارة المسلسلات' name='description'/>
  <meta content='noindex, nofollow' name='robots'/>
  <meta content='#e50914' name='theme-color'/>
  
  <!-- الخطوط والأيقونات -->
  <link href='https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap' rel='stylesheet'/>
  <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'/>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    /* شاشة تسجيل الدخول */
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-header h1 {
      color: #764ba2;
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    
    .login-header p {
      color: #666;
      font-size: 14px;
    }
    
    .login-form .input-group {
      margin-bottom: 20px;
    }
    
    .login-form label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    
    .login-form input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e1e1e1;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s;
      font-family: 'Cairo', sans-serif;
    }
    
    .login-form input:focus {
      border-color: #764ba2;
      outline: none;
      box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
    }
    
    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    
    /* لوحة التحكم الرئيسية */
    .admin-panel {
      max-width: 1400px;
      margin: 0 auto;
      display: none;
    }
    
    .admin-header {
      background: white;
      border-radius: 20px;
      padding: 20px 30px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    .admin-header h1 {
      color: #764ba2;
      font-size: 28px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .admin-header h1 i {
      font-size: 32px;
    }
    
    .admin-stats {
      display: flex;
      gap: 20px;
    }
    
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 25px;
      border-radius: 15px;
      text-align: center;
    }
    
    .stat-card .number {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }
    
    .stat-card .label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .logout-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logout-btn:hover {
      background: #ff6b81;
      transform: translateY(-2px);
    }
    
    /* تبويبات */
    .admin-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      background: white;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      color: #666;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cairo', sans-serif;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .tab-btn i {
      font-size: 18px;
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .tab-btn:hover:not(.active) {
      background: #f5f5f5;
    }
    
    /* محتوى التبويبات */
    .tab-content {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: none;
    }
    
    .tab-content.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* نموذج إضافة مسلسل */
    .form-section {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .form-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e1e1e1;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #764ba2;
      outline: none;
      box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
    }
    
    .form-group textarea {
      height: 120px;
      resize: vertical;
    }
    
    /* قسم الأبطال */
    .cast-section {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    
    .cast-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .cast-header h3 {
      color: #555;
      font-size: 18px;
    }
    
    .add-cast-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .add-cast-btn:hover {
      background: #764ba2;
    }
    
    .cast-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid #e1e1e1;
    }
    
    .remove-cast {
      background: #ff4757;
      color: white;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .remove-cast:hover {
      background: #ff6b81;
    }
    
    /* قسم الحلقات */
    .episode-item {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid #e1e1e1;
    }
    
    .episode-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .episode-header h4 {
      color: #555;
      font-size: 16px;
    }
    
    .remove-episode {
      background: #ff4757;
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .episode-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .add-episode-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .add-episode-btn:hover {
      background: #34ce57;
    }
    
    /* أزرار الإجراءات */
    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    
    .save-btn {
      background: #28a745;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .save-btn:hover {
      background: #34ce57;
      transform: translateY(-2px);
    }
    
    .clear-btn {
      background: #6c757d;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
    }
    
    .clear-btn:hover {
      background: #5a6268;
    }
    
    /* قائمة المسلسلات */
    .series-list {
      display: grid;
      gap: 15px;
    }
    
    .series-card {
      background: #f9f9f9;
      border: 1px solid #e1e1e1;
      border-radius: 15px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: 0.3s;
    }
    
    .series-card:hover {
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    .series-image {
      width: 80px;
      height: 120px;
      border-radius: 10px;
      object-fit: cover;
    }
    
    .series-info {
      flex: 1;
    }
    
    .series-info h3 {
      color: #333;
      margin-bottom: 5px;
      font-size: 20px;
    }
    
    .series-info .meta {
      display: flex;
      gap: 15px;
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }
    
    .series-info .stats {
      display: flex;
      gap: 20px;
      color: #888;
      font-size: 13px;
    }
    
    .series-actions {
      display: flex;
      gap: 10px;
    }
    
    .edit-btn {
      background: #ffc107;
      color: #000;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .edit-btn:hover {
      background: #ffcd39;
    }
    
    .delete-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .delete-btn:hover {
      background: #ff6b81;
    }
    
    /* رسائل التنبيه */
    .alert {
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideIn 0.3s ease;
    }
    
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .close-alert {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: inherit;
    }
    
    /* تأكيد الحذف */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .modal-content h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 24px;
    }
    
    .modal-content p {
      color: #666;
      margin-bottom: 25px;
    }
    
    .modal-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    
    .confirm-btn {
      background: #ff4757;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    
    .cancel-btn {
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    
    /* مؤشر التحميل */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .loading i {
      font-size: 40px;
      color: #764ba2;
      margin-bottom: 15px;
    }
    
    /* تصميم متجاوب */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        text-align: center;
      }
      
      .cast-item {
        grid-template-columns: 1fr;
      }
      
      .episode-links {
        grid-template-columns: 1fr;
      }
      
      .series-card {
        flex-direction: column;
        text-align: center;
      }
      
      .series-actions {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- شاشة تسجيل الدخول -->
  <div class="login-container" id="loginScreen">
    <div class="login-header">
      <i class="fas fa-tv" style="font-size: 50px; color: #764ba2; margin-bottom: 15px;"></i>
      <h1>حكايتنا</h1>
      <p>لوحة تحكم الأدمن</p>
    </div>
    
    <div class="error-message" id="loginError">
      <i class="fas fa-exclamation-circle"></i>
      <span>بيانات الدخول غير صحيحة</span>
    </div>
    
    <div class="login-form">
      <div class="input-group">
        <label><i class="fas fa-user"></i> اسم المستخدم</label>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" value="admin">
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> كلمة المرور</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" value="admin123">
      </div>
      <button class="login-btn" onclick="login()">
        <i class="fas fa-sign-in-alt"></i>
        تسجيل الدخول
      </button>
    </div>
  </div>
  
  <!-- لوحة التحكم الرئيسية -->
  <div class="admin-panel" id="adminPanel">
    <div class="admin-header">
      <h1>
        <i class="fas fa-crown" style="color: #ffd700;"></i>
        لوحة تحكم الأدمن
      </h1>
      
      <div class="admin-stats">
        <div class="stat-card">
          <div class="number" id="totalSeries">0</div>
          <div class="label">مسلسل</div>
        </div>
        <div class="stat-card">
          <div class="number" id="totalEpisodes">0</div>
          <div class="label">حلقة</div>
        </div>
      </div>
      
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        تسجيل خروج
      </button>
    </div>
    
    <!-- رسائل التنبيه -->
    <div id="alertContainer"></div>
    
    <!-- تبويبات -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('add')">
        <i class="fas fa-plus-circle"></i>
        إضافة مسلسل
      </button>
      <button class="tab-btn" onclick="switchTab('list')">
        <i class="fas fa-list"></i>
        قائمة المسلسلات
      </button>
    </div>
    
    <!-- تبويب إضافة مسلسل -->
    <div class="tab-content active" id="tabAdd">
      <div class="form-section">
        <h2><i class="fas fa-info-circle"></i> معلومات المسلسل</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>عنوان المسلسل</label>
            <input type="text" id="seriesTitle" placeholder="مثال: وادي الذئاب">
          </div>
          <div class="form-group">
            <label>رابط الصورة</label>
            <input type="url" id="seriesImage" placeholder="https://example.com/image.jpg">
          </div>
          <div class="form-group">
            <label>رابط الإعلان (trailer)</label>
            <input type="url" id="seriesTrailer" placeholder="رابط يوتيوب أو فيديو">
          </div>
          <div class="form-group">
            <label>التصنيف</label>
            <select id="seriesCategory">
              <option value="تركي">تركي</option>
              <option value="عربي">عربي</option>
              <option value="أكشن">أكشن</option>
              <option value="دراما">دراما</option>
            </select>
          </div>
          <div class="form-group">
            <label>سنة الإنتاج</label>
            <input type="text" id="seriesYear" placeholder="2024">
          </div>
          <div class="form-group">
            <label>الدولة</label>
            <input type="text" id="seriesCountry" placeholder="تركيا">
          </div>
        </div>
        <div class="form-group">
          <label>قصة المسلسل</label>
          <textarea id="seriesDescription" placeholder="اكتب قصة المسلسل هنا..."></textarea>
        </div>
      </div>
      
      <!-- قسم الأبطال -->
      <div class="form-section">
        <div class="cast-header">
          <h2><i class="fas fa-users"></i> الأبطال</h2>
          <button class="add-cast-btn" onclick="addCastField()">
            <i class="fas fa-plus"></i>
            إضافة ممثل
          </button>
        </div>
        <div id="castContainer"></div>
      </div>
      
      <!-- قسم الحلقات -->
      <div class="form-section">
        <div class="cast-header">
          <h2><i class="fas fa-film"></i> الحلقات</h2>
          <button class="add-cast-btn" onclick="addEpisode()">
            <i class="fas fa-plus"></i>
            إضافة حلقة
          </button>
        </div>
        <div id="episodesContainer"></div>
      </div>
      
      <div class="form-actions">
        <button class="save-btn" onclick="saveSeries()">
          <i class="fas fa-save"></i>
          حفظ المسلسل
        </button>
        <button class="clear-btn" onclick="clearForm()">
          <i class="fas fa-undo"></i>
          تفريغ الحقول
        </button>
      </div>
    </div>
    
    <!-- تبويب قائمة المسلسلات -->
    <div class="tab-content" id="tabList">
      <div class="form-group">
        <input type="text" id="searchSeries" placeholder="بحث عن مسلسل..." onkeyup="searchSeries()">
      </div>
      <div id="seriesListContainer" class="series-list"></div>
    </div>
  </div>
  
  <!-- نافذة تأكيد الحذف -->
  <div class="modal" id="deleteModal">
    <div class="modal-content">
      <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: #ff4757; margin-bottom: 15px;"></i>
      <h3>تأكيد الحذف</h3>
      <p>هل أنت متأكد من حذف هذا المسلسل؟ لا يمكن التراجع عن هذا الإجراء.</p>
      <div class="modal-actions">
        <button class="confirm-btn" onclick="confirmDelete()">
          <i class="fas fa-trash"></i>
          حذف
        </button>
        <button class="cancel-btn" onclick="closeModal()">
          <i class="fas fa-times"></i>
          إلغاء
        </button>
      </div>
    </div>
  </div>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <script>
    // تهيئة Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCEaxXR5eqzg0e5JvjWAFjZ5ZeMraMYREn",
      authDomain: "mo-play-b0cb7.firebaseapp.com",
      databaseURL: "https://mo-play-b0cb7-default-rtdb.firebaseio.com",
      projectId: "mo-play-b0cb7",
      storageBucket: "mo-play-b0cb7.firebasestorage.app",
      appId: "1:575424024738:web:0b1736c0c2e496adf607fb"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ========== متغيرات عامة ==========
    let allSeries = [];
    let currentEditId = null;
    let deleteId = null;
    
    // ========== نظام تسجيل الدخول ==========
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem('adminLoggedIn', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadSeries();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
    
    function logout() {
      localStorage.removeItem('adminLoggedIn');
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('username').value = 'admin';
      document.getElementById('password').value = 'admin123';
      document.getElementById('loginError').style.display = 'none';
    }
    
    // ========== تبديل التبويبات ==========
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      if (tab === 'add') {
        document.querySelector('.tab-btn').classList.add('active');
        document.getElementById('tabAdd').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tabList').classList.add('active');
        loadSeries();
      }
    }
    
    // ========== إدارة الأبطال ==========
    let castCount = 0;
    
    function addCastField(name = '', character = '', image = '') {
      const container = document.getElementById('castContainer');
      const castItem = document.createElement('div');
      castItem.className = 'cast-item';
      castItem.id = `cast_${castCount}`;
      castItem.innerHTML = `
        <input type="text" placeholder="اسم الممثل" value="${name}" class="cast-name">
        <input type="text" placeholder="اسم الشخصية" value="${character}" class="cast-character">
        <input type="url" placeholder="رابط الصورة" value="${image}" class="cast-image">
        <button class="remove-cast" onclick="removeCast('cast_${castCount}')">
          <i class="fas fa-times"></i>
        </button>
      `;
      container.appendChild(castItem);
      castCount++;
    }
    
    function removeCast(id) {
      document.getElementById(id).remove();
    }
    
    // ========== إدارة الحلقات ==========
    let episodeCount = 0;
    
    function addEpisode(title = '', link1 = '', link2 = '', link3 = '') {
      const container = document.getElementById('episodesContainer');
      const episodeItem = document.createElement('div');
      episodeItem.className = 'episode-item';
      episodeItem.id = `episode_${episodeCount}`;
      episodeItem.innerHTML = `
        <div class="episode-header">
          <h4>حلقة جديدة</h4>
          <button class="remove-episode" onclick="removeEpisode('episode_${episodeCount}')">
            <i class="fas fa-trash"></i> حذف
          </button>
        </div>
        <div class="form-group">
          <label>رقم/عنوان الحلقة</label>
          <input type="text" class="episode-title" placeholder="1 أو الحلقة 1" value="${title}">
        </div>
        <div class="episode-links">
          <div class="form-group">
            <label>رابط السيرفر 1</label>
            <input type="url" class="episode-link1" value="${link1}">
          </div>
          <div class="form-group">
            <label>رابط السيرفر 2 (اختياري)</label>
            <input type="url" class="episode-link2" value="${link2}">
          </div>
          <div class="form-group">
            <label>رابط السيرفر 3 (اختياري)</label>
            <input type="url" class="episode-link3" value="${link3}">
          </div>
        </div>
      `;
      container.appendChild(episodeItem);
      episodeCount++;
    }
    
    function removeEpisode(id) {
      document.getElementById(id).remove();
    }
    
    // ========== حفظ المسلسل (مع الحفاظ على المشاهدات والتقييم) ==========
    function saveSeries() {
      // التحقق من الحقول الأساسية
      const title = document.getElementById('seriesTitle').value;
      const image = document.getElementById('seriesImage').value;
      
      if (!title || !image) {
        showAlert('الرجاء إدخال عنوان المسلسل والصورة على الأقل', 'error');
        return;
      }
      
      // جمع بيانات المسلسل الجديدة
      const newSeriesData = {
        title: title,
        image: image,
        trailer: document.getElementById('seriesTrailer').value,
        category: document.getElementById('seriesCategory').value,
        year: document.getElementById('seriesYear').value,
        country: document.getElementById('seriesCountry').value,
        description: document.getElementById('seriesDescription').value,
        cast: [],
        episodes: []
      };
      
      // جمع بيانات الأبطال
      document.querySelectorAll('.cast-item').forEach(item => {
        newSeriesData.cast.push({
          name: item.querySelector('.cast-name').value,
          character: item.querySelector('.cast-character').value,
          image: item.querySelector('.cast-image').value
        });
      });
      
      // جمع بيانات الحلقات
      document.querySelectorAll('.episode-item').forEach(item => {
        newSeriesData.episodes.push({
          title: item.querySelector('.episode-title').value,
          link1: item.querySelector('.episode-link1').value,
          link2: item.querySelector('.episode-link2').value,
          link3: item.querySelector('.episode-link3').value
        });
      });
      
      if (currentEditId) {
        // === تعديل مسلسل موجود - الحفاظ على المشاهدات والتقييم ===
        
        // أولاً: جلب البيانات القديمة
        db.ref('series/' + currentEditId).once('value')
          .then((snapshot) => {
            const oldData = snapshot.val() || {};
            
            // دمج البيانات القديمة مع الجديدة مع الحفاظ على المشاهدات والتقييم
            const updatedData = {
              ...newSeriesData,
              // الحفاظ على الإحصائيات القديمة
              rating: oldData.rating || 0,
              ratingCount: oldData.ratingCount || 0,
              views: oldData.views || 0
            };
            
            // تحديث في Firebase
            return db.ref('series/' + currentEditId).update(updatedData);
          })
          .then(() => {
            showAlert('تم تحديث المسلسل بنجاح مع الحفاظ على المشاهدات والتقييم', 'success');
            clearForm();
            currentEditId = null;
            loadSeries();
          })
          .catch(error => showAlert('خطأ في التحديث: ' + error.message, 'error'));
          
      } else {
        // === إضافة مسلسل جديد ===
        const newSeriesRef = db.ref('series').push();
        
        // إضافة القيم الافتراضية للمسلسل الجديد
        const finalData = {
          ...newSeriesData,
          rating: 0,
          ratingCount: 0,
          views: 0
        };
        
        newSeriesRef.set(finalData)
          .then(() => {
            showAlert('تم إضافة المسلسل بنجاح', 'success');
            clearForm();
            loadSeries();
          })
          .catch(error => showAlert('خطأ في الإضافة: ' + error.message, 'error'));
      }
    }
    
    // ========== جلب المسلسلات ==========
    function loadSeries() {
      document.getElementById('seriesListContainer').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><br>جاري التحميل...</div>';
      
      db.ref('series').on('value', (snapshot) => {
        const data = snapshot.val();
        allSeries = [];
        
        if (data) {
          allSeries = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
          }));
        }
        
        updateStats();
        displaySeries(allSeries);
      });
    }
    
    function updateStats() {
      let totalEpisodes = 0;
      allSeries.forEach(series => {
        totalEpisodes += (series.episodes ? series.episodes.length : 0);
      });
      
      document.getElementById('totalSeries').innerText = allSeries.length;
      document.getElementById('totalEpisodes').innerText = totalEpisodes;
    }
    
    function displaySeries(series) {
      const container = document.getElementById('seriesListContainer');
      
      if (series.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#666;">لا توجد مسلسلات</div>';
        return;
      }
      
      let html = '';
      series.forEach(item => {
        const episodesCount = item.episodes ? item.episodes.length : 0;
        
        html += `
          <div class="series-card">
            <img src="${item.image || 'https://via.placeholder.com/300x450'}" class="series-image" onerror="this.src='https://via.placeholder.com/300x450'">
            <div class="series-info">
              <h3>${item.title || 'بدون عنوان'}</h3>
              <div class="meta">
                <span><i class="fas fa-calendar"></i> ${item.year || 'غير معروف'}</span>
                <span><i class="fas fa-globe"></i> ${item.country || 'غير معروف'}</span>
              </div>
              <div class="stats">
                <span><i class="fas fa-star" style="color: #ffd700;"></i> ${item.rating ? item.rating.toFixed(1) : '0'}</span>
                <span><i class="fas fa-eye"></i> ${item.views || 0}</span>
                <span><i class="fas fa-film"></i> ${episodesCount} حلقة</span>
              </div>
            </div>
            <div class="series-actions">
              <button class="edit-btn" onclick="editSeries('${item.id}')">
                <i class="fas fa-edit"></i>
                تعديل
              </button>
              <button class="delete-btn" onclick="openDeleteModal('${item.id}')">
                <i class="fas fa-trash"></i>
                حذف
              </button>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    // ========== تعديل مسلسل ==========
    function editSeries(id) {
      const series = allSeries.find(s => s.id === id);
      if (!series) return;
      
      currentEditId = id;
      
      // تعبئة الحقول الأساسية
      document.getElementById('seriesTitle').value = series.title || '';
      document.getElementById('seriesImage').value = series.image || '';
      document.getElementById('seriesTrailer').value = series.trailer || '';
      document.getElementById('seriesCategory').value = series.category || 'تركي';
      document.getElementById('seriesYear').value = series.year || '';
      document.getElementById('seriesCountry').value = series.country || '';
      document.getElementById('seriesDescription').value = series.description || '';
      
      // تعبئة الأبطال
      document.getElementById('castContainer').innerHTML = '';
      castCount = 0;
      if (series.cast && series.cast.length > 0) {
        series.cast.forEach(actor => {
          addCastField(actor.name, actor.character, actor.image);
        });
      }
      
      // تعبئة الحلقات
      document.getElementById('episodesContainer').innerHTML = '';
      episodeCount = 0;
      if (series.episodes && series.episodes.length > 0) {
        series.episodes.forEach(ep => {
          addEpisode(ep.title, ep.link1, ep.link2, ep.link3);
        });
      }
      
      // التبديل لتبويب الإضافة
      switchTab('add');
      
      showAlert('يمكنك تعديل البيانات الآن - سيتم الحفاظ على المشاهدات والتقييم', 'success');
    }
    
    // ========== حذف مسلسل ==========
    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('deleteModal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('deleteModal').classList.remove('active');
      deleteId = null;
    }
    
    function confirmDelete() {
      if (!deleteId) return;
      
      db.ref('series/' + deleteId).remove()
        .then(() => {
          showAlert('تم حذف المسلسل بنجاح', 'success');
          closeModal();
          loadSeries();
        })
        .catch(error => showAlert('خطأ في الحذف: ' + error.message, 'error'));
    }
    
    // ========== بحث ==========
    function searchSeries() {
      const query = document.getElementById('searchSeries').value.toLowerCase();
      
      if (!query) {
        displaySeries(allSeries);
        return;
      }
      
      const filtered = allSeries.filter(item => 
        item.title && item.title.toLowerCase().includes(query)
      );
      
      displaySeries(filtered);
    }
    
    // ========== تفريغ الحقول ==========
    function clearForm() {
      document.getElementById('seriesTitle').value = '';
      document.getElementById('seriesImage').value = '';
      document.getElementById('seriesTrailer').value = '';
      document.getElementById('seriesCategory').value = 'تركي';
      document.getElementById('seriesYear').value = '';
      document.getElementById('seriesCountry').value = '';
      document.getElementById('seriesDescription').value = '';
      document.getElementById('castContainer').innerHTML = '';
      document.getElementById('episodesContainer').innerHTML = '';
      castCount = 0;
      episodeCount = 0;
      currentEditId = null;
    }
    
    // ========== عرض التنبيهات ==========
    function showAlert(message, type) {
      const container = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.innerHTML = `
        <span><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}</span>
        <button class="close-alert" onclick="this.parentElement.remove()">&times;</button>
      `;
      
      container.appendChild(alert);
      
      setTimeout(() => {
        if (alert.parentElement) alert.remove();
      }, 5000);
    }
    
    // التحقق عند تحميل الصفحة
    window.onload = function() {
      if (localStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadSeries();
      }
    };
  </script>
</body>
</html>
