<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Stream</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

#player{
width:80%;
margin:auto;
background:#000;
padding:20px;
border-radius:10px;
}

video{
width:100%;
background:black;
}
</style>

</head>

<body>

<h2>📺 Live Stream</h2>

<div id="player">

<video id="video" controls autoplay></video>

<p id="status">Connecting...</p>

</div>

<script>

const ws = new WebSocket("ws://117.55.202.104:60000/live?oid=0200bf7cb0lsfez69dd80tgrjty8nwd6");

const video = document.getElementById("video");
const status = document.getElementById("status");

ws.binaryType = "arraybuffer";

let mediaSource = new MediaSource();
video.src = URL.createObjectURL(mediaSource);

mediaSource.addEventListener("sourceopen", () => {

let sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="hvc1"');

ws.onmessage = function(event){

if(event.data instanceof ArrayBuffer){

sourceBuffer.appendBuffer(new Uint8Array(event.data));

}

}

});

ws.onopen = () => {

status.innerText = "Connected to stream";

};

ws.onerror = () => {

status.innerText = "Stream error";

};

ws.onclose = () => {

status.innerText = "Disconnected";

};

</script>

</body>
</html>
