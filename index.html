<html>

<title>Live Stream</title>

<body style="background:black;color:white;text-align:center">

<h2>اتصال البث</h2>

<button onclick="start()">تشغيل</button>

<pre id="log"></pre>

<script>

function start(){

let ws = new WebSocket("ws://117.55.202.104:60000/live?oid=0200bf7cb0lsfez69dd80tgrjty8nwd6");

ws.onopen = function(){
log("تم الاتصال بالسيرفر");
};

};

}

function log(text){
document.getElementById("log").innerHTML += text + "\n";
}

</script>
