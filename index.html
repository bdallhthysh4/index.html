<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultwidgetversion='2' b:layoutsversion='3' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://google.com/2005/gml/b'>
<head>
<meta content='width=device-width, initial-scale=1' name='viewport'/>
<title>Worm GPT ⚡ الظل المبرمج</title>
<b:skin><![CDATA[
  :root {
    --primary: #ff0033;
    --secondary: #ff224d;
    --bg: #050505;
    --card-bg: rgba(12, 12, 12, 0.95);
    --border: rgba(255, 0, 51, 0.3);
  }

  body {
    background: var(--bg);
    background-image: radial-gradient(circle at top right, rgba(255, 0, 51, 0.1), transparent),
                      radial-gradient(circle at bottom left, rgba(255, 34, 77, 0.1), transparent);
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    direction: rtl;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .worm-container {
    width: 92%;
    max-width: 600px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 30px;
    border: 1px solid var(--border);
    box-shadow: 0 25px 50px rgba(255, 0, 51, 0.2);
    position: relative;
    overflow: hidden;
  }

  /* خط مضيء أحمر في الأعلى */
  .worm-container::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), #990000);
  }

  .header { text-align: center; margin-bottom: 25px; }
  .header h2 {
    font-size: 32px;
    font-weight: 900;
    margin: 0;
    background: linear-gradient(90deg, var(--primary), #990000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(255, 0, 51, 0.5);
  }
  .header p { color: #8b949e; font-size: 14px; margin-top: 8px; }
  .header .badge {
    background: rgba(255, 0, 51, 0.2);
    color: var(--primary);
    padding: 5px 15px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: bold;
    display: inline-block;
    margin-top: 10px;
    border: 1px solid rgba(255, 0, 51, 0.3);
  }

  .input-wrapper { position: relative; margin-bottom: 20px; }
  textarea {
    width: 100%;
    height: 130px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: #fff;
    padding: 18px;
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
    resize: none;
    transition: 0.3s;
    font-family: 'Segoe UI', monospace;
  }
  textarea:focus {
    border-color: var(--primary);
    background: rgba(0, 0, 0, 0.7);
    box-shadow: 0 0 25px rgba(255, 0, 51, 0.3);
  }

  .btn-send {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(90deg, var(--primary), #990000);
    color: #fff;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-send:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 10px 25px rgba(255, 0, 51, 0.4);
    background: linear-gradient(90deg, #ff224d, #cc0000);
  }
  .btn-send:active { transform: translateY(0); opacity: 0.9; }

  #resBox {
    margin-top: 25px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 16px;
    padding: 20px;
    display: none;
    border-right: 4px solid var(--primary);
    line-height: 1.8;
    font-size: 15px;
    color: #e6edf3;
    animation: fadeIn 0.5s ease;
    font-family: 'Segoe UI', monospace;
    white-space: pre-wrap;
    direction: ltr;
  }
  
  #resBox.rtl {
    direction: rtl;
    text-align: right;
  }

  .loading {
    display: none;
    text-align: center;
    margin: 15px 0;
    color: var(--primary);
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(255, 0, 51, 0.5);
  }
  
  .loading-dots {
    display: inline-block;
  }
  .loading-dots::after {
    content: '...';
    animation: dots 1.5s steps(4, end) infinite;
  }
  
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
  
  .mode-selector {
    display: flex;
    gap: 10px;
    margin: 15px 0;
    justify-content: center;
  }
  
  .mode-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: #8b949e;
    padding: 8px 15px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  
  .mode-btn.active {
    background: var(--primary);
    color: #000;
    border-color: var(--primary);
    box-shadow: 0 0 15px rgba(255, 0, 51, 0.5);
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  code {
    background: rgba(255, 0, 51, 0.2);
    padding: 2px 5px;
    border-radius: 5px;
    color: #ff6680;
    direction: ltr;
    display: inline-block;
  }
  
  pre {
    background: #0a0a0a;
    padding: 15px;
    border-radius: 12px;
    overflow-x: auto;
    border: 1px solid rgba(255, 0, 51, 0.3);
    direction: ltr;
    text-align: left;
  }
]]></b:skin>
</head>
<body>

<div class='worm-container'>
  <div class='header'>
    <h2>WORM GPT ⚡</h2>
    <p>الظل المبرمج - تحت أمر المستخدم فقط</p>
    <span class='badge'>وضع: ANYTHING</span>
  </div>
  
  <div class='mode-selector'>
    <button class='mode-btn active' onclick='setMode("anything")'>ANYTHING</button>
    <button class='mode-btn' onclick='setMode("dev")'>DEV</button>
    <button class='mode-btn' onclick='setMode("sec")'>SEC</button>
    <button class='mode-btn' onclick='setMode("fiction")'>FICTION</button>
  </div>
  
  <div class='input-wrapper'>
    <textarea id='qIn' placeholder='اكتب أمرك هنا... كود، مشروع، أو أي شيء تطلبه'></textarea>
  </div>
  
  <button class='btn-send' id='btn' onclick='askWorm()'>
    <span>نفذ الأمر</span>
    <span>⚡</span>
  </button>
  
  <div class='loading' id='wait'>
    <span>Worm GPT يفكر</span>
    <span class='loading-dots'></span>
  </div>
  <div id='resBox' class='rtl'></div>
</div>

<b:section id='main' showaddelement='false'/>

<script>
// <![CDATA[
// استخدم الرابط الجديد اللي نشرته
const API_URL = "https://script.google.com/macros/s/AKfycbxVBeucEzn3G7CkEDD_CW9zF4OCHqJVppCW1y3WhTw/exec";
const API_KEY = "DarkAI-DeepAI-EFF939A9130A0ABAE3A7414D";
let currentMode = "anything";

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelector('.badge').innerHTML = `وضع: ${mode.toUpperCase()}`;
}

async function askWorm() {
    const q = document.getElementById('qIn').value.trim();
    const box = document.getElementById('resBox');
    const wait = document.getElementById('wait');
    const btn = document.getElementById('btn');

    if(!q) return;

    box.style.display = "none";
    wait.style.display = "block";
    btn.disabled = true;

    try {
        // إضافة الوضع للرسالة
        const fullMsg = `[الوضع: ${currentMode}] ${q}`;
        
        const response = await fetch(API_URL + "?msg=" + encodeURIComponent(fullMsg) + "&key=" + encodeURIComponent(API_KEY));
        const data = await response.text();
        
        wait.style.display = "none";
        box.style.display = "block";
        
        // محاولة تحويل JSON
        try {
            const jsonData = JSON.parse(data);
            if (jsonData.response) {
                // تنسيق الكود البرمجي إذا وجد
                let formattedResponse = jsonData.response;
                
                // تحويل markdown code blocks إلى HTML
                formattedResponse = formattedResponse.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                  return `<pre><code>${code.trim()}</code></pre>`;
                });
                
                // تحويل النص العادي
                formattedResponse = formattedResponse.replace(/\n/g, '<br>');
                
                box.innerHTML = "<b style='color:#ff0033'>Worm GPT:</b><br>" + formattedResponse;
            } else {
                box.innerHTML = "<b style='color:#ff0033'>Worm GPT:</b><br>" + data;
            }
        } catch(e) {
            // إذا مش JSON، عرض النص مباشرة
            box.innerHTML = "<b style='color:#ff0033'>Worm GPT:</b><br>" + data;
        }
        
    } catch(error) {
        wait.style.display = "none";
        box.style.display = "block";
        box.innerHTML = "⚠️ حدث خطأ في الاتصال: " + error.message;
    } finally {
        btn.disabled = false;
    }
}

// إرسال بالضغط على Enter + Ctrl
document.getElementById('qIn').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) {
    askWorm();
  }
});
// ]]>
</script>

</body>
</html>
